# nginx-tailnet-proxy.example.conf
#
# Example Nginx configuration that reverse-proxies Tailscale-only surfaces on port 8782
# into public-safe paths under the homepage server (e.g., /surfaceA/).
# Replace TS_IP_OR_HOSTNAME_* with actual Tailscale IPs or MagicDNS names.
#
# Also includes the /openwebui/ reverse-proxy block required by the Naga Records & Assets
# panel (king_public_src/Records.dc.html). Open WebUI must be configured with:
#   WEBUI_URL=https://your-domain.com/openwebui    (no trailing slash)
# so that its own script/API/WebSocket paths include the /openwebui prefix.
#
# NOTE: Do NOT apply this directly to production without review. This file is an example only.

upstream surface_a_upstream {
    server TS_IP_OR_HOSTNAME_A:8782;
}

upstream surface_b_upstream {
    server TS_IP_OR_HOSTNAME_B:8782;
}

server {
    listen 80;
    server_name example.com elementlotus.com staging-596d-monkshrooms.wpcomstaging.com;

    # Redirect HTTP -> HTTPS if you terminate TLS
    # return 301 https://$host$request_uri;

    # Surface A proxy path
    location /surfaceA/ {
        proxy_pass http://surface_a_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Surface B proxy path
    location /surfaceB/ {
        proxy_pass http://surface_b_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Open WebUI — private Naga Records & Assets panel ──────────────────────
    # Proxies /openwebui/ → Open WebUI on localhost:3000.
    # WebSocket support is required (Open WebUI uses socket.io for streaming).
    # Restrict this block to Tailscale/private origins if your nginx config supports it.
    #
    # Open WebUI must be started with:
    #   WEBUI_URL=https://your-domain.com/openwebui
    # so that its own JS bundles, API calls, and WebSocket handshakes include the subpath.
    #
    # Frame-embedding: Open WebUI's default X-Frame-Options or CSP may block the iframe.
    # Set WEBUI_AUTH=false is NOT recommended. Instead allow framing only from your Naga origin:
    #   ENABLE_COMMUNITY_SHARING=false
    # and in this proxy block add:
    #   add_header Content-Security-Policy "frame-ancestors 'self' https://your-naga-origin.com";
    # Do NOT set frame-ancestors * or remove X-Frame-Options globally.
    location /openwebui/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /openwebui;
        # WebSocket upgrade (required for streaming / socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Allow framing only from the private Naga origin — do not set frame-ancestors *
        # Adjust the origin below to match your actual Naga/Tailscale hostname.
        add_header Content-Security-Policy "frame-ancestors 'self' https://YOUR_NAGA_ORIGIN" always;
    }

    # Optional health endpoint proxy or local status page
    location /_status/surfaces {
        return 200 "OK"; # replace with proxy or status handler as needed
    }

    # Static files / WordPress front controller can remain here
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
}

# Notes:
# - Proxying from the homepage server to Tailscale surfaces ensures public visitors can access
#   surface content even if they don't have Tailscale access.
# - Alternatively, if all clients have Tailscale access, you could have the browser connect
#   directly to the surfaces; this requires exposing surface hostnames to clients and
#   has limitations for public visitors.
# - Ensure Tailscale ACLs and MagicDNS allow the homepage server to reach the surfaces.
# - For TLS, terminate at the homepage server (Let's Encrypt/Caddy) and proxy over plain HTTP
#   to Tailscale backends (this is common inside a private network).
# - The /openwebui/ block above targets localhost:3000 (king-server local process).
#   If Open WebUI runs on a separate Tailscale node, replace 127.0.0.1:3000 with
#   TS_OPEN_WEBUI_IP:3000 and add it to the upstream block at the top of this file.
