# nginx-tailnet-proxy.example.conf

# Example Nginx configuration that reverse-proxies Tailscale-only surfaces on port 8782
# into public-safe paths under the homepage server (e.g., /surfaceA/).
# Replace TS_IP_OR_HOSTNAME_* with actual Tailscale IPs or MagicDNS names.

# NOTE: Do NOT apply this directly to production without review. This file is an example only.

upstream surface_a_upstream {
    server TS_IP_OR_HOSTNAME_A:8782;
}

upstream surface_b_upstream {
    server TS_IP_OR_HOSTNAME_B:8782;
}

server {
    listen 80;
    server_name example.com elementlotus.com staging-596d-monkshrooms.wpcomstaging.com;

    # Redirect HTTP -> HTTPS if you terminate TLS
    # return 301 https://$host$request_uri;

    # Surface A proxy path
    location /surfaceA/ {
        proxy_pass http://surface_a_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Surface B proxy path
    location /surfaceB/ {
        proxy_pass http://surface_b_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional health endpoint proxy or local status page
    location /_status/surfaces {
        return 200 "OK"; # replace with proxy or status handler as needed
    }

    # Static files / WordPress front controller can remain here
    location / {
        try_files $uri $uri/ /index.php?$args;
    }
}

# Notes:
# - Proxying from the homepage server to Tailscale surfaces ensures public visitors can access
#   surface content even if they don't have Tailscale access.
# - Alternatively, if all clients have Tailscale access, you could have the browser connect
#   directly to the surfaces; this requires exposing surface hostnames to clients and
#   has limitations for public visitors.
# - Ensure Tailscale ACLs and MagicDNS allow the homepage server to reach the surfaces.
# - For TLS, terminate at the homepage server (Let's Encrypt/Caddy) and proxy over plain HTTP
#   to Tailscale backends (this is common inside a private network).
