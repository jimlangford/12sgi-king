openapi: 3.1.0
info:
  title: govOS v2 API
  version: 2.0.0
  description: Sovereign interface specification for auth, tenant, documents, storage, and AI services.
servers:
  - url: http://localhost
paths:
  /api/v2/live:
    get:
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive
  /api/v2/ready:
    get:
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready
  /api/v2/health:
    get:
      summary: Health probe
      responses:
        '200':
          description: Health details
  /api/v2/auth/session:
    post:
      summary: Create auth session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthSessionRequest'
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
  /api/v2/auth/diagnostics/claims:
    post:
      summary: Owner-only non-secret claim diagnostics
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthClaimsDiagnosticRequest'
      responses:
        '200':
          description: Diagnostic claim snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthClaimsDiagnosticResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Diagnostics disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v2/auth/introspect:
    post:
      summary: Verify a bearer token for internal services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthIntrospectionRequest'
      responses:
        '200':
          description: Token verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthIntrospectionResponse'
        '403':
          description: Invalid internal service token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v2/auth/jwks:
    get:
      summary: Public signing keys
      responses:
        '200':
          description: JWKS payload
  /api/v2/auth/renew:
    post:
      summary: Renew a valid owner token without a full OAuth redirect
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenewRequest'
      responses:
        '200':
          description: Renewed owner token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '401':
          description: Token missing, expired, or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Owner role required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v2/auth/debug:
    get:
      summary: Non-sensitive OAuth configuration status for debugging
      responses:
        '200':
          description: OAuth debug info (no secrets exposed)
  /api/v2/auth/github:
    get:
      summary: Start GitHub OAuth owner sign-in
      responses:
        '307':
          description: Redirect to GitHub OAuth
        '501':
          description: GitHub OAuth is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v2/auth/github/callback:
    get:
      summary: Complete GitHub OAuth owner sign-in
      responses:
        '307':
          description: Redirect back to the owner console with token fragment
        '400':
          description: OAuth error page
  /api/v2/auth/google:
    get:
      summary: Start Google OAuth owner sign-in
      responses:
        '307':
          description: Redirect to Google OAuth
        '501':
          description: Google OAuth is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v2/auth/google/callback:
    get:
      summary: Complete Google OAuth owner sign-in
      responses:
        '307':
          description: Redirect back to the owner console with token fragment
        '400':
          description: OAuth error page
  /api/v2/cases:
    get:
      summary: List tenant cases
      responses:
        '200':
          description: Cases list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseListResponse'
    post:
      summary: Create case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaseCreateRequest'
      responses:
        '201':
          description: Case created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
  /api/v2/cases/{case_id}:
    get:
      summary: Get case
      parameters:
        - in: path
          name: case_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Case details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v2/documents/generate:
    post:
      summary: Generate document from template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentGenerateRequest'
      responses:
        '201':
          description: Document generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
  /api/v2/documents/{document_id}:
    get:
      summary: Get document metadata
      parameters:
        - in: path
          name: document_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v2/storage/objects:
    post:
      summary: Register object metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorageObjectCreateRequest'
      responses:
        '201':
          description: Object registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageObjectResponse'
    get:
      summary: List objects
      responses:
        '200':
          description: Objects list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageObjectListResponse'
  /api/v2/storage/objects/{object_id}:
    get:
      summary: Get object metadata
      parameters:
        - in: path
          name: object_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageObjectResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v2/ai/assist:
    post:
      summary: Generate assistant guidance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiAssistRequest'
      responses:
        '200':
          description: Guidance response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiAssistResponse'
components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    AuthSessionRequest:
      type: object
      required: [provider, subject]
      properties:
        provider:
          type: string
          enum: [passkey, google, apple, microsoft, magic_link, github]
        subject:
          type: string
        email:
          type: string
          format: email
        tenant_id:
          type: string
        role:
          type: string
          enum: [Owner, Municipality, Partner, Resident, Service]
        scopes:
          type: array
          items:
            type: string
        audience:
          type: string
        expires_in:
          type: integer
    AuthSessionResponse:
      type: object
      required: [access_token, token_type, expires_in, claims, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: "Bearer"
        expires_in:
          type: integer
          description: Lifetime in seconds
        claims:
          type: object
          required: [sub, role, scopes, exp, iss, aud]
          properties:
            sub:
              type: string
            tenant_id:
              type: string
            role:
              type: string
              enum: [Owner, Municipality, Partner, Resident, Service]
            scopes:
              type: array
              items:
                type: string
            exp:
              type: integer
            iss:
              type: string
            aud:
              type: string
        user:
          type: object
          required: [id, provider]
          properties:
            id:
              type: string
            provider:
              type: string
            email:
              type: string
            tenant_id:
              type: string
            role:
              type: string
            scopes:
              type: array
              items:
                type: string
    AuthClaimsDiagnosticRequest:
      type: object
      properties:
        token:
          type: string
          description: Optional target bearer token to inspect when owner-authenticated.
    AuthIntrospectionRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    AuthIntrospectionResponse:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
        reason:
          type: string
        claims:
          type: object
          additionalProperties: true
        user:
          type: object
          additionalProperties: true
    AuthClaimsDiagnosticResponse:
      type: object
      required:
        - subject
        - role
        - tenant_id
        - accepted_scopes
        - issuer
        - audience
        - expires_at
        - authorization_decision
        - audit_event_id
        - request_id
      properties:
        subject:
          type: string
        role:
          type: string
        tenant_id:
          type: string
        accepted_scopes:
          type: array
          items:
            type: string
        issuer:
          type: string
        audience:
          type: string
        expires_at:
          type: integer
          nullable: true
        authorization_decision:
          type: string
          enum: [accepted, denied]
        audit_event_id:
          type: string
        request_id:
          type: string
    RenewRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    CaseCreateRequest:
      type: object
      required: [tenant_id, title]
      properties:
        tenant_id:
          type: string
        title:
          type: string
        status:
          type: string
          default: open
        notes:
          type: string
    CaseResponse:
      type: object
      required: [id, tenant_id, title, status, created_at]
      properties:
        id:
          type: string
        tenant_id:
          type: string
        title:
          type: string
        status:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
    CaseListResponse:
      type: object
      required: [cases]
      properties:
        cases:
          type: array
          items:
            $ref: '#/components/schemas/CaseResponse'
    DocumentGenerateRequest:
      type: object
      required: [template_id, case_id, output_format]
      properties:
        template_id:
          type: string
        case_id:
          type: string
        output_format:
          type: string
          enum: [pdf, docx, html]
        fields:
          type: object
          additionalProperties: true
    DocumentResponse:
      type: object
      required: [id, template_id, case_id, output_format, status, created_at]
      properties:
        id:
          type: string
        template_id:
          type: string
        case_id:
          type: string
        output_format:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
    StorageObjectCreateRequest:
      type: object
      required: [name, content_type]
      properties:
        name:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          minimum: 0
    StorageObjectResponse:
      type: object
      required: [id, name, content_type, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
        created_at:
          type: string
          format: date-time
        download_url:
          type: string
    StorageObjectListResponse:
      type: object
      required: [objects]
      properties:
        objects:
          type: array
          items:
            $ref: '#/components/schemas/StorageObjectResponse'
    AiAssistRequest:
      type: object
      required: [case_id, prompt]
      properties:
        case_id:
          type: string
        prompt:
          type: string
        context:
          type: object
          additionalProperties: true
    AiAssistResponse:
      type: object
      required: [case_id, summary, actions]
      properties:
        case_id:
          type: string
        summary:
          type: string
        actions:
          type: array
          items:
            type: string
