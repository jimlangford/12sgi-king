<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="../govos.css">
</head>
<body>
<x-dc>
<helmet>
  <script src="./ds-base.js"></script>
</helmet>

<!-- Events panel — owner-gated, connects to the existing /events route on the v2 owner node.
     Shows the platform event feed (auth, case, workboard transitions) with live refresh.
     Dead-letter events are shown in a separate section at the bottom. -->
<div data-surface="events" data-screen-label="Platform Events"
  style="min-height:100%; background:var(--app-backdrop,#0c0b09); color:var(--ink,#efe9da);
    font-family:'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif; font-size:14px;">

  <!-- Header -->
  <div style="display:flex; align-items:center; gap:10px; padding:14px clamp(14px,2.5vw,28px); border-bottom:1px solid var(--line,#34301f);">
    <span style="font-size:18px; color:var(--accent,#e3ad33);">◈</span>
    <div>
      <div style="font-weight:700; font-size:15px; letter-spacing:0.3px;">12sgi · Naga</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.6px; text-transform:uppercase; color:var(--ink-faint,#756b56);">Platform Events</div>
    </div>
    <span style="margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; background:rgba(227,173,51,0.14); color:var(--accent,#e3ad33); border:1px solid var(--accent,#e3ad33); border-radius:20px; padding:3px 10px;">owner · private</span>
  </div>

  <div style="max-width:900px; padding:0 clamp(14px,2.5vw,28px) 60px; margin:0 auto;">

    <!-- Summary bar -->
    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin:18px 0;">
      <div style="background:var(--panel,#16140f); border:1px solid var(--line,#34301f); border-radius:10px; padding:12px 14px;">
        <div style="font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--ok,#6abf86);" id="ev-count">—</div>
        <div style="font-size:11px; color:var(--ink-faint,#756b56); margin-top:2px;">Recent events</div>
      </div>
      <div style="background:var(--panel,#16140f); border:1px solid var(--line,#34301f); border-radius:10px; padding:12px 14px;">
        <div style="font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--warn,#d29922);" id="ev-dl-count">—</div>
        <div style="font-size:11px; color:var(--ink-faint,#756b56); margin-top:2px;">Dead letters</div>
      </div>
      <div style="background:var(--panel,#16140f); border:1px solid var(--line,#34301f); border-radius:10px; padding:12px 14px; cursor:pointer;" onclick="eventsRefresh()">
        <div style="font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--ink-dim,#b3a98f);">↺</div>
        <div style="font-size:11px; color:var(--ink-faint,#756b56); margin-top:2px;">Refresh</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div style="display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;">
      <input id="ev-filter" placeholder="Filter by event type or producer…"
        style="flex:1; min-width:200px; background:var(--panel,#16140f); border:1px solid var(--line,#34301f); border-radius:6px; padding:7px 12px; color:var(--ink,#efe9da); font-size:13px; font-family:'JetBrains Mono',monospace;"
        oninput="eventsApplyFilter()" />
    </div>

    <!-- Auth diagnostics -->
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--ink-faint,#756b56); border-bottom:1px solid var(--line,#34301f); padding:8px 0 6px; margin-bottom:10px;">
      Auth Diagnostics
      <button onclick="eventsRunIdentityDiag()"
        style="float:right; font-family:inherit; font-size:10px; letter-spacing:1.2px; text-transform:uppercase; background:rgba(227,173,51,0.12); color:var(--accent,#e3ad33); border:1px solid var(--accent,#e3ad33); border-radius:14px; padding:3px 10px; cursor:pointer;">↻ Identity Link</button>
    </div>
    <div id="ev-auth-diag" style="background:var(--panel,#16140f); border:1px solid var(--line,#34301f); border-radius:10px; padding:11px 14px; font-family:'JetBrains Mono',monospace; font-size:11px; line-height:1.65; color:var(--ink-dim,#b3a98f); margin-bottom:14px;">
      Run identity-link diagnostics to verify current owner link state.
    </div>

    <!-- Event feed -->
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--ink-faint,#756b56); border-bottom:1px solid var(--line,#34301f); padding:18px 0 6px; margin-bottom:10px;">Event Feed</div>
    <div id="ev-feed" style="font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.7;">
      <div style="color:var(--ink-faint,#756b56); padding:24px 0; text-align:center;">Loading…</div>
    </div>

    <!-- Dead-letter section -->
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--ink-faint,#756b56); border-bottom:1px solid var(--line,#34301f); padding:28px 0 6px; margin-bottom:10px;">Dead Letters</div>
    <div id="ev-dead" style="font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.7;">
      <div style="color:var(--ink-faint,#756b56); padding:12px 0; text-align:center;">Loading…</div>
    </div>

    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-faint,#756b56); text-align:center; padding-top:32px;">
      12 Stones Global · Platform Events · private — owner unlocked · aloha · pono
    </div>
  </div>

</div>

<script>
(function() {
  var _allEvents = [];
  var _liveBase = null;

  function _token() {
    try { return localStorage.getItem('king.ownerToken'); } catch(e) { return null; }
  }

  function _headers() {
    var t = _token();
    return t ? { 'Authorization': 'Bearer ' + t } : {};
  }

  function _authBase() {
    return (typeof window.KING_AUTH_URL !== 'undefined' && window.KING_AUTH_URL) || 'https://auth.12sgi.com';
  }

  function _diagHeaders(requestId) {
    var h = _headers();
    h['Content-Type'] = 'application/json';
    h['X-Request-ID'] = requestId;
    return h;
  }

  function _el(id) { return document.getElementById(id); }

  function _esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  var EVENT_TYPE_COLORS = {
    'auth.session.created': '#6abf86',
    'auth.oauth.failed':    '#e05252',
    'case.created':         '#6ab4e3',
    'workboard.job.created': '#e3ad33',
    'workboard.job.approved': '#6abf86',
    'workboard.job.rejected': '#e05252',
    'workboard.engineering.selfhealed': '#b3a98f',
  };

  function _typeColor(type) {
    return EVENT_TYPE_COLORS[type] || '#b3a98f';
  }

  function _renderEvents(events) {
    var feed = _el('ev-feed');
    if (!feed) return;
    if (!events || !events.length) {
      feed.innerHTML = '<div style="color:var(--ink-faint,#756b56); padding:24px 0; text-align:center;">No events yet.</div>';
      return;
    }
    feed.innerHTML = events.map(function(ev) {
      var color = _typeColor(ev.event_type || '');
      var payload = '';
      try {
        var p = JSON.parse(ev.payload_json || '{}');
        var keys = Object.keys(p);
        if (keys.length) {
          payload = keys.slice(0,6).map(function(k) {
            return '<span style="color:var(--ink-dim,#b3a98f)">' + _esc(k) + '</span>=<span style="color:var(--ink,#efe9da)">' + _esc(String(p[k]).slice(0,60)) + '</span>';
          }).join('  ');
        }
      } catch(e) {}
      return '<div style="border-bottom:1px solid var(--line,#34301f); padding:7px 0;">' +
        '<span style="color:' + color + '; font-weight:700;">' + _esc(ev.event_type) + '</span>' +
        '  <span style="color:var(--ink-faint,#756b56);">' + _esc(ev.producer) + '</span>' +
        (ev.entity_id ? '  <span style="color:var(--ink-dim,#b3a98f);">' + _esc(ev.entity_id.slice(0,16)) + '</span>' : '') +
        '  <span style="color:var(--ink-faint,#756b56); float:right;">' + _esc((ev.ts||'').slice(0,19).replace('T',' ')) + '</span>' +
        (payload ? '<div style="font-size:11px; padding-top:2px; padding-left:12px;">' + payload + '</div>' : '') +
        '</div>';
    }).join('');
  }

  function _renderDeadLetters(dls) {
    var el = _el('ev-dead');
    if (!el) return;
    if (!dls || !dls.length) {
      el.innerHTML = '<div style="color:var(--ink-faint,#756b56); padding:10px 0; text-align:center;">None.</div>';
      return;
    }
    el.innerHTML = dls.map(function(dl) {
      return '<div style="border-bottom:1px solid var(--line,#34301f); padding:7px 0; color:var(--warn,#d29922);">' +
        '<span style="font-weight:700;">' + _esc(dl.event_type) + '</span>' +
        '  <span style="color:var(--ink-faint,#756b56);">' + _esc(dl.producer) + '</span>' +
        '  <span style="color:var(--ink-dim,#b3a98f);">' + _esc(dl.reason) + '</span>' +
        '  <span style="color:var(--ink-faint,#756b56); float:right;">' + _esc((dl.ts||'').slice(0,19).replace('T',' ')) + '</span>' +
        '</div>';
    }).join('');
  }

  function _renderIdentityDiag(payload) {
    var el = _el('ev-auth-diag');
    if (!el) return;
    var tone = payload && payload.authorization_decision === 'accepted' ? '#6abf86' : '#d29922';
    el.style.borderColor = tone;
    el.innerHTML =
      '<div style="color:' + tone + '; font-weight:700; margin-bottom:4px;">decision: ' + _esc(payload.authorization_decision || 'unknown') + '</div>' +
      '<div>provider: <span style="color:var(--ink,#efe9da)">' + _esc(payload.provider || '—') + '</span></div>' +
      '<div>subject: <span style="color:var(--ink,#efe9da)">' + _esc(payload.subject || '—') + '</span></div>' +
      '<div>email: <span style="color:var(--ink,#efe9da)">' + _esc(payload.email || '—') + '</span></div>' +
      '<div>has_identity_link: <span style="color:var(--ink,#efe9da)">' + _esc(String(!!payload.has_identity_link)) + '</span></div>' +
      '<div>entitlement_verified: <span style="color:var(--ink,#efe9da)">' + _esc(String(!!payload.entitlement_verified)) + '</span></div>' +
      '<div>entitlement_tier: <span style="color:var(--ink,#efe9da)">' + _esc(payload.entitlement_tier || '—') + '</span></div>' +
      '<div>last_reason: <span style="color:var(--ink,#efe9da)">' + _esc(payload.last_entitlement_verification_reason || '—') + '</span></div>' +
      '<div>request_id: <span style="color:var(--ink,#efe9da)">' + _esc(payload.request_id || '—') + '</span></div>' +
      '<div>audit_event_id: <span style="color:var(--ink,#efe9da)">' + _esc(payload.audit_event_id || '—') + '</span></div>';
  }

  window.eventsRunIdentityDiag = function() {
    var el = _el('ev-auth-diag');
    var token = _token();
    if (!el) return;
    if (!token) {
      el.style.borderColor = '#d29922';
      el.textContent = 'Sign in first — owner token required.';
      return;
    }
    var requestId = 'ev-diag-' + Date.now();
    el.style.borderColor = 'var(--line,#34301f)';
    el.textContent = 'Running /api/v2/auth/diagnostics/identity-link …';
    fetch(_authBase() + '/api/v2/auth/diagnostics/identity-link', {
      method: 'POST',
      headers: _diagHeaders(requestId),
      body: JSON.stringify({})
    })
      .then(function(r) {
        if (!r.ok) {
          return r.text().then(function(t) {
            throw new Error('HTTP ' + r.status + (t ? (' · ' + t.slice(0, 200)) : ''));
          });
        }
        return r.json();
      })
      .then(function(data) { _renderIdentityDiag(data || {}); })
      .catch(function(err) {
        el.style.borderColor = '#e05252';
        el.textContent = 'Identity-link diagnostics failed: ' + err.message;
      });
  };

  function _fetch(base) {
    var b = base || _liveBase;
    if (!b) {
      var feed = _el('ev-feed');
      if (feed) feed.innerHTML = '<div style="color:var(--ink-faint,#756b56); padding:24px 0; text-align:center;">Not connected — open from the owner machine.</div>';
      return;
    }
    var h = _headers();

    // Fetch events
    fetch(b + '/events?limit=100', { headers: h, cache: 'no-store' })
      .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function(data) {
        _allEvents = data.events || [];
        var cnt = _el('ev-count');
        if (cnt) cnt.textContent = _allEvents.length;
        eventsApplyFilter();
      })
      .catch(function(e) {
        var feed = _el('ev-feed');
        if (feed) feed.innerHTML = '<div style="color:#e05252; padding:24px 0; text-align:center;">Could not load events (' + e + ').</div>';
      });

    // Fetch dead letters
    fetch(b + '/events/dead-letters?limit=20', { headers: h, cache: 'no-store' })
      .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function(data) {
        var dls = data.dead_letters || [];
        var cnt = _el('ev-dl-count');
        if (cnt) cnt.textContent = dls.length;
        _renderDeadLetters(dls);
      })
      .catch(function() {});
  }

  window.eventsRefresh = function() { _fetch(); };

  window.eventsApplyFilter = function() {
    var q = (_el('ev-filter') || {}).value || '';
    var filtered = q
      ? _allEvents.filter(function(ev) {
          return (ev.event_type || '').indexOf(q) >= 0 || (ev.producer || '').indexOf(q) >= 0;
        })
      : _allEvents;
    _renderEvents(filtered);
  };

  // Subscribe to KingLive for the owner node base URL
  if (window.KingLive) {
    window.KingLive.subscribe(function(s) {
      if (s && s.base) {
        _liveBase = s.base;
        _fetch(s.base);
      }
    });
  } else {
    var feed = _el('ev-feed');
    if (feed) feed.innerHTML = '<div style="color:var(--ink-faint,#756b56); padding:24px 0; text-align:center;">KingLive not available — open from the owner machine.</div>';
  }

  // Auto-refresh every 30s
  setInterval(function() { _fetch(); }, 30000);
})();
</script>

</x-dc>
<script src="../govos-shell.js" defer></script>
</body>
</html>
