<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="../govos.css">
</head>
<body>
<x-dc>
<helmet><script src="./ds-base.js"></script></helmet>

<div data-surface="more" data-screen-label="More"
  style="min-height:100%; background:var(--app-backdrop,#0c0b09); color:var(--ink,#efe9da); font-family:'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif; font-size:14px; padding:clamp(14px,2.5vw,28px); max-width:980px;">

  <div style="margin-bottom:18px;">
    <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px;">
      <span style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-faint,#756b56);">{{ modeLabel }} · extras</span>
      <span style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:3px 9px; border-radius:999px; border:1px solid var(--line,#34301f); color:var(--ink-dim,#b3a98f);">as needed</span>
    </div>
    <h1 style="margin:0; font-size:clamp(20px,3.1vw,28px);">More</h1>
    <p style="margin:5px 0 0; color:var(--ink-dim,#b3a98f); line-height:1.6;">Use only if core tabs do not fit.</p>
  </div>

  <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-faint,#756b56); border-bottom:1px solid var(--line,#34301f); padding-bottom:6px; margin-bottom:12px;">Tools</div>
  <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; margin-bottom:18px;">
    <sc-for list="{{ surfaces }}" as="s" hint-placeholder-count="4">
      <button onClick="{{ s.go }}" style="display:flex; flex-direction:column; align-items:flex-start; gap:5px; border:1px solid var(--line,#34301f); border-radius:10px; background:var(--panel,#16140f); color:var(--ink,#efe9da); padding:12px 14px; font:inherit; text-align:left; cursor:pointer;" style-hover="border-color:var(--accent,#e3ad33);">
        <div style="display:flex; align-items:center; gap:8px; width:100%;">
          <span>{{ s.icon }}</span>
          <span style="font-size:13px; font-weight:600;">{{ s.label }}</span>
          <span style="margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-faint,#756b56);">{{ s.tag }}</span>
        </div>
        <div style="font-size:12px; color:var(--ink-dim,#b3a98f); line-height:1.45;">{{ s.desc }}</div>
      </button>
    </sc-for>
  </div>

  <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--ink-faint,#756b56); border-bottom:1px solid var(--line,#34301f); padding-bottom:6px; margin-bottom:12px;">Checks</div>
  <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:18px;">
    <sc-for list="{{ checks }}" as="c" hint-placeholder-count="5">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; border:1px solid var(--line,#34301f); border-radius:10px; background:var(--panel,#16140f); padding:10px 12px;">
        <div style="font-size:12.5px; color:var(--ink,#efe9da); line-height:1.45;">{{ c.title }}</div>
        <span style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:3px 9px; border-radius:999px; border:1px solid var(--line,#34301f); color:var(--ink-dim,#b3a98f);">{{ c.status }}</span>
      </div>
    </sc-for>
  </div>

  <div style="background:var(--panel,#16140f); border:1px dashed var(--line,#34301f); border-radius:10px; padding:12px 14px;">
    <div style="font-size:12px; color:var(--ink-faint,#756b56); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px;">No match</div>
    <div style="font-size:12.5px; color:var(--ink-dim,#b3a98f); line-height:1.55;">Back to Home + core tabs.</div>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  _go(id) {
    try { localStorage.setItem('king.surface', id); } catch(e) {}
    window.location.reload();
  }

  renderVals() {
    const mode = (() => {
      try {
        const owner = !!localStorage.getItem('king.ownerToken');
        const ui = localStorage.getItem('king.uiMode') || 'public';
        return owner && ui === 'private' ? 'private' : 'public';
      } catch(e) { return 'public'; }
    })();

    const publicSurfaces = [
      { icon: '🌙', label: 'Moon', desc: 'Moon rhythm view.', tag: 'public', go: () => this._go('mooncal') },
      { icon: '👁', label: 'Watcher', desc: 'Live civic feed.', tag: 'public', go: () => this._go('watcher') },
      { icon: '🌍', label: 'Globe', desc: 'Civic map view.', tag: 'public', go: () => this._go('aupuni') },
      { icon: '🎛', label: 'Studio →', desc: 'Open Studio.', tag: 'bridge', go: () => { window.location.href = 'go.html'; } },
    ];

    const privateSurfaces = [
      { icon: '📡', label: 'Launch', desc: 'Launch controls.', tag: 'private', go: () => this._go('launch') },
      { icon: '🔗', label: 'Connect', desc: 'Connector status.', tag: 'bridge', go: () => this._go('connectors') },
      { icon: '◈', label: 'Hub', desc: 'Witness rollup.', tag: 'private', go: () => this._go('hub') },
    ];

    return {
      modeLabel: mode === 'private' ? 'PRIVATE' : 'PUBLIC',
      surfaces: mode === 'private' ? privateSurfaces : publicSurfaces,
      checks: [
        { title: 'Public records in ≤2 taps', status: 'verify' },
        { title: 'Mobile = 4 tabs + More', status: 'verify' },
        { title: 'Sign-in opens PRIVATE Home', status: 'verify' },
        { title: 'Low-frequency tools stay in More', status: 'verify' },
        { title: 'Empty/state chips stay consistent', status: 'verify' },
      ],
    };
  }
}
</script>
<script src="../govos-shell.js" defer></script>
</body>
</html>
