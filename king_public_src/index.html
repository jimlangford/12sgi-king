<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<script>
/* Mobile/Tailscale fix: if served at /king (no trailing slash), relative links like
   civic/… resolve to the site root (/civic/… → 404). Force the trailing slash so the
   shell scripts AND every civic card resolve under /king/. No-op when already slashed
   (local :8799 root, GitHub Pages /…/king/). */
(function(){var p=location.pathname;if(p&&!/\/$/.test(p)&&!/\.[a-z0-9]+$/i.test((p.split('/').pop()||'')))location.replace(location.origin+p+'/'+location.search+location.hash);})();
</script>
<script src="./support.js"></script>
<link rel="stylesheet" href="../govos.css">
</head>

    html, body { margin:0; padding:0; height:100%; background:#0c0b09; }

    ::-webkit-scrollbar-thumb { background:#34301f; border-radius:5px; }

    </div>
  </sc-if>

  <div style="display:flex; flex:1; min-height:0;">

    <!-- ══ DESKTOP rail ══ -->

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    surface: (() => { try { return localStorage.getItem('king.surface') || 'dashboard'; } catch(e) { return 'dashboard'; } })(),
    uiMode: (() => { try { return localStorage.getItem('king.uiMode') || 'public'; } catch(e) { return 'public'; } })(),
    owner: (() => {
      try {
        const t = localStorage.getItem('king.ownerToken');
        if (!t) return false;
        const pad = s => s + '='.repeat((4 - s.length % 4) % 4);
        const p = JSON.parse(atob(pad(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))));
        return !!p && p.exp > Math.floor(Date.now() / 1000);
      } catch(e) { return false; }
    })(),
    showSignIn: false,
    w: typeof window !== 'undefined' ? window.innerWidth : 1280,
  };

  componentDidMount() {
    this._onR = () => this.setState({ w: window.innerWidth });
    window.addEventListener('resize', this._onR);
    if (window.KingLive) {
      this._unLive = window.KingLive.subscribe(s =>
        this.setState({ liveStatus: s.status, liveLabel: s.baseLabel || '' }));
    }
    // ── OAuth callback: pick up #token=… placed by the auth service redirect ──
    try {
      const m = window.location.hash.match(/[#&]token=([^&]+)/);
      if (m) {
        const raw = decodeURIComponent(m[1]);
        const parts = raw.split('.');
        if (parts.length === 3) {
          const pad = s => s + '='.repeat((4 - s.length % 4) % 4);
          const payload = JSON.parse(atob(pad(parts[1].replace(/-/g,'+').replace(/_/g,'/'))));
          if (payload && payload.exp > Math.floor(Date.now() / 1000)) {
            localStorage.setItem('king.ownerToken', raw);
            this.setState({ owner: true });
          }
        }
        // Remove the token fragment from the URL bar (clean share-safe URL).
        window.history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    } catch(ignore) {}
    // ── Silent renewal: if stored token expires within 30 min, renew proactively ──
    this._scheduleTokenRenewal();
  }
  componentWillUnmount() {
    window.removeEventListener('resize', this._onR);
    if (this._unLive) this._unLive();
    if (this._renewTimer) clearTimeout(this._renewTimer);
  }

  // ── Silent govOS token renewal ────────────────────────────────────────────
  // If the stored owner token will expire within 30 minutes, call /api/v2/auth/renew
  // on the auth service to get a fresh 8-hour token — no OAuth redirect required.
  // If the token is already expired, the console leaves it as-is; the owner will
  // see a 401 the next time they try to approve something and can sign in again.
  _scheduleTokenRenewal() {
    if (this._renewTimer) clearTimeout(this._renewTimer);
    try {
      const raw = localStorage.getItem('king.ownerToken');
      if (!raw) return;
      const parts = raw.split('.');
      if (parts.length !== 3) return;
      const pad = s => s + '='.repeat((4 - s.length % 4) % 4);
      const payload = JSON.parse(atob(pad(parts[1].replace(/-/g,'+').replace(/_/g,'/'))));
      const exp = payload && payload.exp ? payload.exp : 0;
      const now = Math.floor(Date.now() / 1000);
      if (exp <= now) return;                          // already expired — no renewal
      const renewIn = Math.max(0, (exp - now - 1800)) * 1000;  // 30 min before expiry
      this._renewTimer = setTimeout(() => this._renewToken(), renewIn);
    } catch(ignore) {}
  }

  _renewToken() {
    const KING_AUTH_URL = (typeof window !== 'undefined' && window.KING_AUTH_URL) || 'https://auth.12sgi.com';
    const raw = localStorage.getItem('king.ownerToken');
    if (!raw) return;
    fetch(`${KING_AUTH_URL}/api/v2/auth/renew`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: raw }),
    })
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(data => {
      if (data && data.access_token) {
        localStorage.setItem('king.ownerToken', data.access_token);
        this._scheduleTokenRenewal();   // re-schedule for the new token's expiry
      }
    })
    .catch(() => {
      // Renewal failed (token expired or auth service unreachable) — leave token
      // as-is; the owner will be prompted to sign in when they next try to approve.
    });
  }

  go(id) {
    try { localStorage.setItem('king.surface', id); } catch(e) {}
    this.setState({ surface: id });
  }

  setMode(mode) {
    const m = mode === 'private' ? 'private' : 'public';
    try { localStorage.setItem('king.uiMode', m); } catch(e) {}
    this.setState({ uiMode: m });
  }

  openSignIn() { this.setState({ showSignIn: true }); }
  closeSignIn() { this.setState({ showSignIn: false }); }

  signOut() {
    try {
      localStorage.removeItem('king.ownerToken');
      localStorage.removeItem('king.owner');
      localStorage.removeItem('king.ownerKey');
      localStorage.removeItem('king.uiMode');
    } catch(e) {}
    try { localStorage.setItem('king.surface', 'dashboard'); } catch(e) {}
    this.setState({ owner: false, showSignIn: false, uiMode: 'public', surface: 'dashboard' });
  }

  toggleOwner() {
    if (this.state.owner) { this.signOut(); } else { this.openSignIn(); }
  }

  renderVals() {
    const KING_AUTH_URL = (typeof window !== 'undefined' && window.KING_AUTH_URL) || 'https://auth.12sgi.com';
    const s = this.state.surface;
    const isMobile = this.state.w < 860;
    // owner:true => private to the operator (shown in nav, locked for the public).
    // owner:false => public-facing govOS system (civic transparency + Sage Game).
    // Civic side is CIVIC-ONLY. The studio surfaces (Lyric Manager / Note for Note /
    // Scene Review / Motion Picture) live in the elementLOTUS Studio app (:8770) and
    // are reached via the "Studio ->" door, NOT from the civic nav. (2026-06-14)
    const ITEMS = [
      { id:'dashboard', label:'Home',              short:'Home',    icon:'🏠', modes:['public'],  core:true,  owner:false },
      { id:'mauios',    label:'govOS',             short:'govOS',   icon:'🌺', modes:['public'],  core:true,  owner:false },
      { id:'council',   label:'Council & Agendas', short:'Council', icon:'🏛', modes:['public'],  core:true,  owner:false },
      { id:'game',      label:'Sage Game',         short:'Game',    icon:'🎮', modes:['public'],  core:true,  owner:false },
      { id:'studio',    label:'Studio →',          short:'Studio',  icon:'🎛', modes:['public'],  core:false, owner:false, href:'go.html' },
      { id:'mooncal',   label:'Moon Calendar',     short:'Moon',    icon:'🌙', modes:['public'],  core:false, owner:false },
      { id:'watcher',   label:'Watcher',           short:'Watch',   icon:'👁', modes:['public'],  core:false, owner:false },
      { id:'aupuni',    label:'Aupuni Globe',      short:'Globe',   icon:'🌍', modes:['public'],  core:false, owner:false },
      { id:'ownerhome', label:'Home',              short:'Home',    icon:'◉', modes:['private'], core:true,  owner:true  },
      { id:'ops',       label:'Ops Board',         short:'Ops',     icon:'⌗', modes:['private'], core:true,  owner:true  },
      { id:'graph',     label:'Graph Ratchet',     short:'Graph',   icon:'⟡', modes:['private'], core:true,  owner:true  },
      { id:'gpu',       label:'GPU · CPU Router',  short:'GPU',     icon:'⚡', modes:['private'], core:true,  owner:true  },
      { id:'events',    label:'Platform Events',   short:'Events',  icon:'◈', modes:['private'], core:true,  owner:true  },
      { id:'launch',    label:'Launch Center',     short:'Launch',  icon:'📡', modes:['private'], core:false, owner:true  },
      { id:'connectors',label:'Connectors',        short:'Connect', icon:'🔗', modes:['private'], core:false, owner:true  },
      { id:'hub',       label:'Hub · Witness',     short:'Hub',     icon:'◈', modes:['private'], core:false, owner:true  },
      { id:'records',   label:'Records & Assets',  short:'Records', icon:'📂', modes:['private'], core:false, owner:true  },
      { id:'studiodepts',label:'Studio Depts',      short:'Studio',  icon:'🎬', modes:['private'], core:true,  owner:true  },
      { id:'more',      label:'More',              short:'More',    icon:'⋯', modes:['public', 'private'], core:true, owner:false },
    ];
    const unlocked = this.state.owner;
    const mode = unlocked && this.state.uiMode === 'private' ? 'private' : 'public';
    const homeByMode = { public: 'dashboard', private: 'ownerhome' };
    const modeItems = ITEMS.filter(it => it.modes.indexOf(mode) >= 0 && (!it.owner || unlocked));
    const modeIds = new Set(modeItems.map(it => it.id));
    const activeId = modeIds.has(s) ? s : homeByMode[mode];
    // PUBLIC build: only these surfaces' files are deployed here. The rest stay as the
    // owner-access panel even if "unlocked", so they never try to load a missing file (404).
    // (The full studio surfaces live in the local owner app, not the public site.)
    const AVAIL = ['mauios', 'council', 'game', 'dashboard', 'ownerhome', 'watcher', 'aupuni', 'graph', 'ops', 'gpu', 'hub', 'mooncal', 'launch', 'connectors', 'events', 'records', 'more'];
    const avail = id => AVAIL.indexOf(id) >= 0;
    // Task-first: show only core tasks in main nav; route low-frequency surfaces through "More".
    const navItems = modeItems.filter(it => it.core).map(it => ({
      ...it,
      // external doors (href, e.g. Studio) navigate out; everything else is an in-app surface
      go: () => it.href ? (window.location.href = it.href) : this.go(it.id),
      on: activeId === it.id,
      off: activeId !== it.id,
      locked: !it.href && !avail(it.id),
      lockGlyph: '',
    }));
    const mobileNavItems = (() => {
      const more = navItems.find(it => it.id === 'more');
      const primary = navItems.filter(it => it.id !== 'more').slice(0, 4);
      return more ? [...primary, more] : primary;
    })();
    const cur = ITEMS.find(i => i.id === activeId) || ITEMS[0];
    const curLocked = !avail(cur.id);
    const ls = this.state.liveStatus || 'connecting';
    return {
      navItems, mobileNavItems, isMobile, isDesktop: !isMobile,
      liveOn: ls === 'live', liveOff: ls === 'offline', liveWait: ls === 'connecting',
      liveLabel: this.state.liveLabel || '',
      activeLabel: isMobile ? cur.short : cur.label,
      modeLabel: mode === 'private' ? 'PRIVATE' : 'PUBLIC',
      modeHint: mode === 'private' ? 'PUBLIC' : 'PRIVATE',
      canSwitchModes: unlocked,
      modeToggle: () => this.setMode(mode === 'private' ? 'public' : 'private'),
      owner: unlocked,
      ownerToggle: () => this.toggleOwner(),
      ownerGlyph: unlocked ? '🔓' : '🔒',
      ownerLabel: unlocked ? 'Sign out' : 'Private sign in',
      showSignIn: this.state.showSignIn,
      goGithubSignIn: () => { window.location.href = `${KING_AUTH_URL}/api/v2/auth/github`; },
      goGoogleSignIn: () => { window.location.href = `${KING_AUTH_URL}/api/v2/auth/google`; },
      closeSignIn: () => this.closeSignIn(),
      showLock: curLocked,
      lockLabel: cur.label,
      showOverview: activeId === 'overview' && unlocked && avail('overview'),
      showLyrics: s === 'lyrics' && unlocked && avail('lyrics'),
      showTabs: s === 'tabs' && unlocked && avail('tabs'),
      showScenes: s === 'scenes' && unlocked && avail('scenes'),
      showFilm: s === 'film' && unlocked && avail('film'),
      showMission: activeId === 'mission' && unlocked && avail('mission'),
      showPush: activeId === 'push' && unlocked && avail('push'),
      showGame: activeId === 'game',
      showMoonCal: activeId === 'mooncal',
      showMauios: activeId === 'mauios',
      showCouncil: activeId === 'council',
      showDashboard: activeId === 'dashboard',
      showOwnerHome: activeId === 'ownerhome' && unlocked && avail('ownerhome'),
      showWatcher: activeId === 'watcher',
      showAupuni: activeId === 'aupuni',
      showGraph: activeId === 'graph' && unlocked && avail('graph'),
      showOps: activeId === 'ops' && unlocked,
      showGpu: activeId === 'gpu' && unlocked && avail('gpu'),
      showHub: activeId === 'hub' && unlocked && avail('hub'),
      showLaunch: activeId === 'launch' && unlocked && avail('launch'),
      showConnectors: activeId === 'connectors' && unlocked && avail('connectors'),
      showEvents: activeId === 'events' && unlocked && avail('events'),
      showRecords: activeId === 'records' && unlocked && avail('records'),
      showStudiodepts: activeId === 'studiodepts' && unlocked,
      showMore: activeId === 'more' && avail('more'),
    };
  }
}

</script>
<script src="../govos-shell.js" defer></script>
</body>
</html>
