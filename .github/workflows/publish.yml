name: kilo-aupuni publish

# Runs the civic-transparency watchers on GitHub's FREE runners (off your laptop),
# rebuilds the static site, and deploys it to GitHub Pages. No Cloudflare token,
# no separate project, no API keys except an optional LegiScan key. $0/month.
on:
  schedule:
    - cron: "20 15 * * *"     # daily ~05:20 HST (15:20 UTC)
  workflow_dispatch: {}        # run on demand from the Actions tab
  push:
    branches: [ main ]
    paths: [ "watchers/**", "build_site.py", ".github/workflows/**" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Lay out the runtime tree the watchers expect
        env:
          LEGISCAN_KEY: ${{ secrets.LEGISCAN_KEY }}
        run: |
          set -e
          P="$HOME/Documents/Claude/Projects/Video System elementLOTUS"
          mkdir -p "$P/tools/kilo-aupuni" "$P/config" "$HOME/Documents/Claude/tools/council-watch"
          cp watchers/council_watch.py "$HOME/Documents/Claude/tools/council-watch/"
          cp watchers/*.py "$P/tools/kilo-aupuni/"
          cp watchers/departments.json watchers/energov_permit_template.json watchers/commission_inputs.json "$P/tools/kilo-aupuni/" 2>/dev/null || true
          if [ -n "$LEGISCAN_KEY" ]; then printf '%s' "$LEGISCAN_KEY" > "$P/config/legiscan_key.txt"; fi

      - name: Run watchers (public APIs + pypdf only -- no laptop, no browser)
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          P="$HOME/Documents/Claude/Projects/Video System elementLOTUS/tools/kilo-aupuni"
          C="$HOME/Documents/Claude/tools/council-watch"
          python "$C/council_watch.py" || true
          python "$P/votes_watch.py" || true
          python "$P/bids_watch.py" || true
          python "$P/mapps_watch.py" || true
          python "$P/donor_watch.py" || true
          python "$P/statewide_money.py" || true
          if [ -f "$HOME/Documents/Claude/Projects/Video System elementLOTUS/config/legiscan_key.txt" ]; then
            python "$P/lege_legiscan.py" --years 2024 2026 || true
          fi
          python "$P/commission_watch.py" || true
          python "$P/bill9_testimony.py" || true
          python "$P/charter_law_map.py" || true
          python "$P/patterns.py" || true
          python "$P/kilo_aupuni.py" || true

      - name: Build static site
        run: python build_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
