name: Label PR by changed paths

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Optional PR number to label (for manual runs)'
        required: false
      dry_run:
        description: 'If true, do not actually add labels; just print what would happen'
        required: false
        default: 'true'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-by-path:
    name: label-by-path
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine PR number
        id: pr
        run: |
          if [ -n "${{ github.event.pull_request.number || '' }}" ]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.pr_number || '' }}" ]; then
            echo "pr_number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          else
            echo "No PR number available; exiting" >&2
            echo "pr_number=0" >> $GITHUB_OUTPUT
          fi

      - name: Label PR by path (safe, fail-soft)
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER || '0', 10)
            const dryRun = (process.env.DRY_RUN || 'true') === 'true'

            if (!prNumber || prNumber === 0) {
              core.info('No PR number provided; skipping labeling.')
              return
            }

            core.info(`Labeling PR #${prNumber} (dry_run=${dryRun})`)

            // simple path -> label mapping (edit as needed)
            const mapping = [
              { pattern: '^apps/govos/', label: 'area:govos' },
              { pattern: '^apps/tenant/', label: 'area:tenant' },
              { pattern: '^apps/civic-signal/', label: 'area:civic-signal' },
              { pattern: '^apps/admin/', label: 'area:admin' },
              { pattern: '^services/auth/', label: 'area:auth' },
              { pattern: '^services/ai/', label: 'area:ai' },
              { pattern: '^services/documents/', label: 'area:documents' },
              { pattern: '^services/storage/', label: 'area:storage' },
              { pattern: '^services/health/', label: 'area:health' },
              { pattern: '^docs/', label: 'area:docs' },
            ]

            async function run() {
              const { data: files } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 250,
              })

              const paths = files.map(f => f.filename)
              core.info(`Changed files: ${paths.join(', ')}`)

              const labelsToAdd = new Set()
              for (const p of paths) {
                for (const m of mapping) {
                  const re = new RegExp(m.pattern)
                  if (re.test(p)) labelsToAdd.add(m.label)
                }
              }

              if (labelsToAdd.size === 0) {
                core.info('No matching labels for changed files.')
                return
              }

              const labels = Array.from(labelsToAdd)
              core.info(`Would add labels: ${labels.join(', ')}`)

              if (dryRun) {
                core.info('Dry run enabled; not adding labels.')
                return
              }

              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: labels,
                })
                core.info('Labels added successfully')
              } catch (err) {
                if (err.status === 403) {
                  core.warning('Permission denied when adding labels (403). This job will not fail the workflow.')
                  core.info('Ensure the workflow has issues: write and pull-requests: write permissions if you want auto-labeling to run.')
                } else {
                  // For other errors, surface them but do not fail the entire CI run
                  core.warning(`Failed to add labels: ${err.message || String(err)}`)
                }
              }
            }

            await run()

        env:
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
