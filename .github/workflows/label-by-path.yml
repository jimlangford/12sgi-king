name: Label PRs by changed paths

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  issues: write
  pull-requests: read

jobs:
  label-by-path:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR based on touched files
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            // Fetch list of changed files in the PR
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: prNumber
            });
            const paths = files.map(f => f.filename);

            // Patterns -> label mapping (prefix / exact matching)
            const mapping = [
              { match: p => p.startsWith('docs/'), label: 'area:docs' },
              { match: p => p.startsWith('king_public_src/'), label: 'area:public-src' },
              { match: p => p.startsWith('shared-ui/'), label: 'area:ui' },
              { match: p => p.startsWith('watchers/'), label: 'area:watchers' },
              { match: p => p.startsWith('seed_reports/'), label: 'area:seed' },
              { match: p => p.startsWith('tools/'), label: 'area:site' },
              { match: p => p.startsWith('staging/'), label: 'area:staging' },
              { match: p => p === 'build_site.py' || p === 'narratives.json' || p === 'packages.json', label: 'area:site' }
            ];

            const labelsToAdd = new Set();

            for (const p of paths) {
              for (const m of mapping) {
                try {
                  if (m.match(p)) labelsToAdd.add(m.label);
                } catch (e) {
                  // ignore
                }
              }
            }

            if (labelsToAdd.size === 0) {
              console.log('No area labels matched for PR #' + prNumber);
              return;
            }

            const labelsArray = Array.from(labelsToAdd);

            // Ensure labels exist; create them if missing
            for (const lbl of labelsArray) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: lbl });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({ owner, repo, name: lbl, color: 'ededed', description: 'Auto-created area label' });
                } else {
                  throw err;
                }
              }
            }

            // Add labels to the PR (PR is an issue for labels API)
            await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: labelsArray });

            console.log('Added labels ' + labelsArray.join(', ') + ' to PR #' + prNumber);
