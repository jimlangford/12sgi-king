name: CI - Secret Scan

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets (all branches)
        run: |
          detect-secrets scan --all-files \
            --force-use-all-plugins \
            --baseline .secrets.baseline \
            . || echo "Scan complete (failures OK on first run)"

      - name: Check for high-entropy strings
        run: |
          pip install truffleHog
          truffleHog filesystem . --json | python -m json.tool || true

      - name: Verify common patterns
        run: |
          echo "Checking for common secret patterns..."
          grep -r "password\|secret\|token\|api_key" --include="*.py" --include="*.js" --include="*.yml" . \
            | grep -v node_modules | grep -v ".git" | grep -v "test_" | grep -v "example" \
            | head -20 || echo "No obvious secrets found"
        continue-on-error: true
