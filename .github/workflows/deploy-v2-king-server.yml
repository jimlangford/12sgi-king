name: Deploy V2 to king-server (private, self-hosted)

# PRIVATE — this workflow runs exclusively on the self-hosted runner installed on king-server
# (Tailscale host 12sgianonymous.tail760750.ts.net).
#
# Security rules:
#   - No SSH.  No rsync.  No inbound ports.  No Tailscale Funnel for SSH/Docker/Ollama.
#   - The runner polls GitHub over HTTPS; all execution stays on king-server.
#   - This workflow NEVER touches the public 12sgi.com deploy or GitHub Pages.
#   - Public deploy lives in publish.yml and deploy-to-server.yml — keep them separate.
#
# What this does:
#   1. Checkout repo on king-server
#   2. Validate V2 service files are present
#   3. Run V2 contract smoke tests (no live services needed)
#   4. Copy /go Owner Console and private board files to king-local deploy path
#   5. Restart approved local V2 services via docker compose (if stack is running)
#   6. Verify /go and /board/api/* health against localhost ports
#   7. Write a timestamped deployment log to the local king-server log directory
#
# To use:
#   1. On king-server, install the GitHub Actions self-hosted runner
#      (Settings → Actions → Runners → New self-hosted runner) with labels:
#        self-hosted, king-server, windows
#   2. Trigger manually: Actions → "Deploy V2 to king-server" → Run workflow
#
# Optional trigger on push to v2-related paths (disabled by default — uncomment to enable):
# push:
#   branches: [main]
#   paths:
#     - "services/**"
#     - "docker-compose.v2.yml"
#     - "go.html"

on:
  workflow_dispatch:
    inputs:
      restart_services:
        description: "Restart V2 Docker services after deploy (true/false)"
        required: false
        default: "false"
      dry_run:
        description: "Dry run — validate and report only, make no changes"
        required: false
        default: "false"

# No special GitHub permissions needed — all work is local to king-server.
permissions:
  contents: read

jobs:
  deploy-v2-private:
    name: V2 private deploy — king-server
    runs-on: [self-hosted, king-server, windows]
    timeout-minutes: 20

    env:
      # king-local deploy directory — the private owner surface on this machine.
      # Matches the path used by blog_engine.py, daily_brief.py, and king_message.py.
      KING_LOCAL: "${{ runner.temp }}\\..\\..\\..\\AppData\\Local\\king-extract\\deploy\\king-local"
      # Local V2 service ports (bound to 127.0.0.1 only — see docker-compose.v2.yml)
      V2_AUTH_PORT: "8101"
      V2_TENANT_PORT: "8102"
      V2_DOCUMENTS_PORT: "8103"
      V2_STORAGE_PORT: "8104"
      V2_AI_PORT: "8105"
      V2_HEALTH_PORT: "8106"
      V2_GPU_ROUTER_PORT: "8107"
      V2_SERVICE_INVENTORY: "neo4j,auth,tenant,documents,gpu-runtime,gpu-router,ai,storage,health"
      V2_API_PORT_INVENTORY: "auth=8101,tenant=8102,documents=8103,storage=8104,ai=8105,health=8106,gpu-router=8107"
      # Local deployment log directory (PRIVATE — never committed to repo)
      DEPLOY_LOG_DIR: "C:\\Users\\12sgi\\Documents\\Claude\\logs\\v2-deploy"
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      RESTART_SERVICES: ${{ github.event.inputs.restart_services || 'false' }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deployment provenance environment
        shell: pwsh
        run: |
          # Read canonical platform version from root VERSION file
          $platformVersion = (Get-Content VERSION -Raw -ErrorAction SilentlyContinue).Trim()
          if (-not $platformVersion) { $platformVersion = "unknown" }
          $buildTime = (Get-Date -Format o -AsUTC)
          "PLATFORM_VERSION=$platformVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BUILD_COMMIT=${{ github.sha }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BUILD_TIME=$buildTime" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          # Also set the legacy names used by service_metadata.py for backward compat
          "COMMIT_SHA=${{ github.sha }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BUILD_TIMESTAMP=$buildTime" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "ENVIRONMENT=king-server-private" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Platform version: $platformVersion"
          Write-Host "Build commit:     ${{ github.sha }}"
          Write-Host "Build time:       $buildTime"

      # ── 2. Validate V2 files ───────────────────────────────────────────────────
      - name: Validate V2 service files are present
        shell: pwsh
        run: |
          $required = @(
            "services\auth\app\main.py",
            "services\tenant\app\main.py",
            "services\documents\app\main.py",
            "services\storage\app\main.py",
            "services\ai\app\main.py",
            "services\health\app\main.py",
            "services\gpu_router\app\main.py",
            "services\v2_workboard.py",
            "docker-compose.v2.yml",
            "go.html",
            "docs\api\v2-api-contract.yaml"
          )
          $missing = @()
          foreach ($f in $required) {
            if (-not (Test-Path $f)) { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error "V2 validation failed — missing required files:`n$($missing -join "`n")"
            exit 1
          }
          Write-Host "✓ All $($required.Count) required V2 files present"

      # ── 3. V2 contract smoke tests (no live services required) ─────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Run V2 contract smoke tests
        shell: pwsh
        run: |
          Write-Host "Running V2 contract tests..."
          python -m unittest tests.v2.test_v2_contract -v
          Write-Host "✓ V2 contract tests passed"

      # ── 4. Copy /go Owner Console + private board files to king-local ──────────
      - name: Resolve king-local deploy path
        shell: pwsh
        id: king_local
        run: |
          # Try the canonical AppData path first; fall back to the repo-relative king-local
          # (used when running from the Documents/Claude checkout directly).
          $canonical = "$env:USERPROFILE\AppData\Local\king-extract\deploy\king-local"
          $fallback  = "$env:USERPROFILE\Documents\Claude\king-local"
          if (Test-Path $canonical) {
            $path = $canonical
          } elseif (Test-Path $fallback) {
            $path = $fallback
          } else {
            Write-Warning "king-local not found at $canonical or $fallback — skipping private file copy"
            $path = ""
          }
          "KING_LOCAL_PATH=$path" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($path) { Write-Host "king-local resolved to: $path" }

      - name: Copy /go Owner Console and board files to king-local
        if: steps.king_local.outputs.KING_LOCAL_PATH != ''
        shell: pwsh
        run: |
          $dest = "${{ steps.king_local.outputs.KING_LOCAL_PATH }}"
          $dry  = "$env:DRY_RUN" -eq "true"

          # Files that belong to the private /go and /board owner surfaces
          $files = @{
            "go.html"                                  = "go.html"
            "king_public_src\ops_board.html"           = "board.html"
            "king_public_src\social_drafts_board.html" = "social.html"
          }

          foreach ($src in $files.Keys) {
            $target = Join-Path $dest $files[$src]
            if ($dry) {
              Write-Host "[DRY RUN] Would copy $src → $target"
            } else {
              Copy-Item -Path $src -Destination $target -Force -ErrorAction SilentlyContinue
              if (Test-Path $target) {
                Write-Host "✓ Copied $src → $target"
              } else {
                Write-Warning "Could not copy $src (destination may not exist yet)"
              }
            }
          }

          # go/ Owner Console subpages — docker, ollama, llm-watch, comfyui, github, system, logs.
          # These must live next to go.html so relative href="go/X.html" links resolve correctly.
          $goSrc  = "go"
          $goDest = Join-Path $dest "go"
          if (Test-Path $goSrc) {
            if ($dry) {
              Write-Host "[DRY RUN] Would copy go\*.html → $goDest\"
            } else {
              if (-not (Test-Path $goDest)) { New-Item -ItemType Directory -Path $goDest -Force | Out-Null }
              $goFiles = Get-ChildItem -Path $goSrc -Filter "*.html" -File
              foreach ($gf in $goFiles) {
                $gtarget = Join-Path $goDest $gf.Name
                Copy-Item -Path $gf.FullName -Destination $gtarget -Force -ErrorAction SilentlyContinue
                if (Test-Path $gtarget) {
                  Write-Host "✓ Copied go\$($gf.Name) → $gtarget"
                } else {
                  Write-Warning "Could not copy go\$($gf.Name)"
                }
              }
              Write-Host "✓ go/ Owner Console subpages deployed ($($goFiles.Count) files)"
            }
          } else {
            Write-Warning "go/ subdirectory not found in repo — subpages will not be available"
          }

      - name: Validate V2 compose plan and print inventory
        shell: pwsh
        run: |
          $dc = Get-Command "docker" -ErrorAction SilentlyContinue
          if (-not $dc) {
            Write-Error "docker not found on PATH — cannot validate docker-compose.v2.yml"
            exit 1
          }
          Write-Host "Intended V2 service inventory:"
          foreach ($svc in ($env:V2_SERVICE_INVENTORY -split ',')) {
            Write-Host "  - $svc"
          }
          Write-Host "Expected API ports:"
          foreach ($port in ($env:V2_API_PORT_INVENTORY -split ',')) {
            Write-Host "  - $port"
          }
          Write-Host "Expected deployment provenance:"
          Write-Host "  - commit_sha=$env:COMMIT_SHA"
          Write-Host "  - build_timestamp=$env:BUILD_TIMESTAMP"
          Write-Host "  - environment=$env:ENVIRONMENT"
          $config = docker compose -f docker-compose.v2.yml config 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "docker compose validation failed:`n$($config | Out-String)"
            exit 1
          }
          Write-Host "✓ docker compose -f docker-compose.v2.yml config passed"

      # ── 5. Restart V2 services via docker compose (if opted in) ───────────────
      - name: Restart V2 Docker services
        if: env.RESTART_SERVICES == 'true' && env.DRY_RUN != 'true'
        shell: pwsh
        run: |
          # Only restart if docker compose is available and the stack is already running.
          # We never cold-start the stack here — that's an owner decision.
          $dc = Get-Command "docker" -ErrorAction SilentlyContinue
          if (-not $dc) {
            Write-Warning "docker not found on PATH — skipping service restart"
            exit 0
          }
          $running = docker compose -f docker-compose.v2.yml ps --services --filter status=running 2>$null
          if (-not $running) {
            Write-Warning "V2 stack does not appear to be running — skipping restart (start it manually first)"
            exit 0
          }
          Write-Host "Restarting V2 services..."
          docker compose -f docker-compose.v2.yml up -d --build --no-deps
          Write-Host "✓ docker compose up -d complete"

      # ── 6. Verify /go and /board/api/* health against localhost ───────────────
      - name: Health-check V2 localhost services
        shell: pwsh
        run: |
          $severityRank = @{
            info = 0
            low = 1
            high = 2
            critical = 3
          }
          $findings = New-Object System.Collections.Generic.List[object]
          $maxSeverity = "info"
          $seenCommitShas = New-Object System.Collections.Generic.HashSet[string]

          function Add-Finding([string]$Service, [string]$Severity, [string]$Code, [string]$Message) {
            $script:findings.Add([pscustomobject]@{
              service = $Service
              severity = $Severity
              code = $Code
              message = $Message
            }) | Out-Null
            if ($severityRank[$Severity] -gt $severityRank[$script:maxSeverity]) {
              $script:maxSeverity = $Severity
            }
          }

          function Test-Iso8601([string]$Value) {
            if ([string]::IsNullOrWhiteSpace($Value)) { return $false }
            try {
              [datetimeoffset]::Parse($Value) | Out-Null
              return $true
            } catch {
              return $false
            }
          }

          # When services were just restarted (RESTART_SERVICES=true) we expect them to be up,
          # so unreachable is a hard-failure (high). When running a dry run or a default
          # dispatch (RESTART_SERVICES=false) the stack may legitimately be stopped — downgrade
          # unreachable to low so the step reports without blocking.
          $expectRunning = $env:RESTART_SERVICES -eq "true" -and $env:DRY_RUN -ne "true"
          $unreachableSeverity = if ($expectRunning) { "high" } else { "low" }

          $checks = @(
            @{ name="auth";       port=$env:V2_AUTH_PORT;      path="/api/v2/ready"; expected_status=200 },
            @{ name="tenant";     port=$env:V2_TENANT_PORT;    path="/api/v2/ready"; expected_status=200 },
            @{ name="documents";  port=$env:V2_DOCUMENTS_PORT; path="/api/v2/ready"; expected_status=200 },
            @{ name="storage";    port=$env:V2_STORAGE_PORT;   path="/api/v2/ready"; expected_status=200 },
            @{ name="ai";         port=$env:V2_AI_PORT;        path="/api/v2/ready"; expected_status=200 },
            @{ name="health";     port=$env:V2_HEALTH_PORT;    path="/api/v1/ready"; expected_status=200 },
            @{ name="gpu-router"; port=$env:V2_GPU_ROUTER_PORT; path="/api/v2/ready"; expected_status=200 }
          )
          $results = @{}
          $serviceMeta = @{}
          foreach ($svc in $checks) {
            $url = "http://127.0.0.1:$($svc.port)$($svc.path)"
            try {
              $r = Invoke-WebRequest -Uri $url -TimeoutSec 5 -SkipHttpErrorCheck -ErrorAction Stop
            } catch {
              $results[$svc.name] = "unreachable"
              Add-Finding $svc.name $unreachableSeverity "service_unreachable" "Readiness endpoint unreachable at $url"
              Write-Warning "  ✗ $($svc.name) → $url  [unreachable]"
              continue
            }

            $results[$svc.name] = "http-$($r.StatusCode)"
            try {
              $body = $r.Content | ConvertFrom-Json -ErrorAction Stop
            } catch {
              Add-Finding $svc.name "high" "malformed_metadata" "Readiness response at $url was not valid JSON"
              Write-Warning "  ✗ $($svc.name) → $url  [malformed JSON]"
              continue
            }

            $serviceMeta[$svc.name] = $body
            Write-Host "  • $($svc.name) → $url  [$($r.StatusCode)]"

            if ([int]$r.StatusCode -ne [int]$svc.expected_status) {
              $severity = if (@(401, 403) -contains [int]$r.StatusCode) { "critical" } else { "high" }
              Add-Finding $svc.name $severity "readiness_status_mismatch" "Expected HTTP $($svc.expected_status) from $url, got $($r.StatusCode)"
            }

            if (-not $body.service -or [string]::IsNullOrWhiteSpace([string]$body.service)) {
              Add-Finding $svc.name "high" "missing_service_field" "Response missing non-empty service field"
            }
            if (-not $body.version -or [string]::IsNullOrWhiteSpace([string]$body.version)) {
              Add-Finding $svc.name "high" "missing_version_field" "Response missing non-empty version field"
            }
            if (-not $body.commit_sha -or [string]::IsNullOrWhiteSpace([string]$body.commit_sha)) {
              Add-Finding $svc.name "high" "missing_commit_sha" "Response missing non-empty commit_sha field"
            } else {
              [void]$seenCommitShas.Add([string]$body.commit_sha)
              if ([string]$body.commit_sha -ne [string]$env:COMMIT_SHA) {
                Add-Finding $svc.name "high" "mismatched_commit_sha" "commit_sha '$($body.commit_sha)' does not match expected '$($env:COMMIT_SHA)'"
              }
            }
            if (-not $body.build_timestamp -or [string]::IsNullOrWhiteSpace([string]$body.build_timestamp)) {
              Add-Finding $svc.name "high" "missing_build_timestamp" "Response missing non-empty build_timestamp field"
            } elseif (-not (Test-Iso8601 ([string]$body.build_timestamp))) {
              Add-Finding $svc.name "high" "invalid_build_timestamp" "build_timestamp '$($body.build_timestamp)' is not valid ISO-8601"
            }
            if (-not $body.environment -or [string]::IsNullOrWhiteSpace([string]$body.environment)) {
              Add-Finding $svc.name "high" "missing_environment" "Response missing non-empty environment field"
            } elseif ([string]$body.environment -ne "king-server-private") {
              Add-Finding $svc.name "high" "invalid_environment" "environment '$($body.environment)' does not equal king-server-private"
            }
          }

          if ($seenCommitShas.Count -gt 1) {
            Add-Finding "fleet" "high" "mixed_commit_sha" "Services reported mixed commit_sha values: $([string]::Join(', ', $seenCommitShas))"
          }

          # /go and /board are static files served locally — check king-local path exists
          $goPath   = "${{ steps.king_local.outputs.KING_LOCAL_PATH }}\go.html"
          $boardPath = "${{ steps.king_local.outputs.KING_LOCAL_PATH }}\board.html"
          if ($goPath -and (Test-Path $goPath)) {
            $results["go.html"] = "present"
            Write-Host "  ✓ go.html present at king-local"
          } else {
            $results["go.html"] = "missing"
            Write-Warning "  ✗ go.html not found at king-local path"
          }
          if ($boardPath -and (Test-Path $boardPath)) {
            $results["board.html"] = "present"
            Write-Host "  ✓ board.html present at king-local"
          } else {
            $results["board.html"] = "missing"
            Write-Warning "  ✗ board.html not found at king-local path"
          }

          # go/ Owner Console subpages — verify all 7 panels are present
          $goSubPages = @("docker.html","ollama.html","llm-watch.html","comfyui.html","github.html","system.html","logs.html")
          $goSubDir   = "${{ steps.king_local.outputs.KING_LOCAL_PATH }}\go"
          $goSubMissing = @()
          foreach ($sp in $goSubPages) {
            $spPath = Join-Path $goSubDir $sp
            if (-not (Test-Path $spPath)) { $goSubMissing += $sp }
          }
          if ($goSubMissing.Count -eq 0) {
            $results["go/subpages"] = "all present ($($goSubPages.Count) panels)"
            Write-Host "  ✓ go/ subpages: all $($goSubPages.Count) Owner Console panels present"
          } else {
            $results["go/subpages"] = "missing: $([string]::Join(', ', $goSubMissing))"
            Write-Warning "  ✗ go/ subpages missing: $([string]::Join(', ', $goSubMissing))"
          }

          # Write summary
          "::group::Health check summary"
          $results.GetEnumerator() | ForEach-Object { Write-Host "  $($_.Key): $($_.Value)" }
          if ($findings.Count -gt 0) {
            Write-Host "Validation findings:"
            foreach ($finding in $findings) {
              Write-Host "  [$($finding.severity)] $($finding.service) $($finding.code): $($finding.message)"
            }
          } else {
            Write-Host "Validation findings: none"
          }
          "::endgroup::"

          # Export for log step
          $json = $results | ConvertTo-Json -Compress
          "HEALTH_RESULTS=$json" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $metaJson = $serviceMeta | ConvertTo-Json -Depth 8 -Compress
          "SERVICE_METADATA=$metaJson" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $findingsJson = $findings | ConvertTo-Json -Depth 6 -Compress
          "VALIDATION_FINDINGS=$findingsJson" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          if ($severityRank[$maxSeverity] -ge $severityRank["high"]) {
            Write-Error "V2 provenance/readiness validation failed with max severity '$maxSeverity' (restart_services=$env:RESTART_SERVICES)"
            exit 1
          }

      # ── 7. Write deployment log to king-server local log directory ─────────────
      - name: Write local deployment log
        if: always()
        shell: pwsh
        run: |
          $logDir = $env:DEPLOY_LOG_DIR
          if (-not $logDir) { $logDir = "$env:USERPROFILE\Documents\Claude\logs\v2-deploy" }
          if (-not (Test-Path $logDir)) { New-Item -ItemType Directory -Path $logDir -Force | Out-Null }

          $ts      = Get-Date -Format "yyyy-MM-ddTHH-mm-ssZ" -AsUTC
          $logFile = Join-Path $logDir "deploy-$ts.json"

          $entry = @{
            timestamp     = (Get-Date -Format "o" -AsUTC)
            run_id        = "${{ github.run_id }}"
            run_number    = "${{ github.run_number }}"
            sha           = "${{ github.sha }}"
            expected_sha  = $env:COMMIT_SHA
            platform_version = $env:PLATFORM_VERSION
            build_commit  = $env:BUILD_COMMIT
            build_time    = $env:BUILD_TIME
            build_timestamp = $env:BUILD_TIMESTAMP
            environment   = $env:ENVIRONMENT
            ref           = "${{ github.ref }}"
            actor         = "${{ github.actor }}"
            dry_run       = ($env:DRY_RUN -eq "true")
            restart_req   = ($env:RESTART_SERVICES -eq "true")
            king_local    = "${{ steps.king_local.outputs.KING_LOCAL_PATH }}"
            health        = if ($env:HEALTH_RESULTS) { $env:HEALTH_RESULTS | ConvertFrom-Json } else { $null }
            services      = if ($env:SERVICE_METADATA) { $env:SERVICE_METADATA | ConvertFrom-Json } else { $null }
            findings      = if ($env:VALIDATION_FINDINGS) { $env:VALIDATION_FINDINGS | ConvertFrom-Json } else { $null }
            outcome       = "${{ job.status }}"
          }

          $entry | ConvertTo-Json -Depth 5 | Out-File -FilePath $logFile -Encoding utf8
          Write-Host "Deployment log written to: $logFile"
          # Keep only the 30 most recent deploy logs
          Get-ChildItem $logDir -Filter "deploy-*.json" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -Skip 30 |
            Remove-Item -Force -ErrorAction SilentlyContinue
