name: CI - Accessibility

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  a11y-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pa11y
        run: |
          npm install -g pa11y pa11y-ci

      - name: Scan HTML files for a11y issues (WCAG 2.2 AA)
        run: |
          find . -name "*.html" -path "./king_public_src/*" -o -path "./apps/*" | while read f; do
            echo "Scanning $f..."
            pa11y "$f" --standard WCAG2AA || true
          done
        continue-on-error: true

      - name: Install axe for deeper scan
        run: npm install -g @axe-core/cli

      - name: Axe accessibility scan
        run: |
          # Scan common entry points
          axe file://$(pwd)/king_public_src/index.html --exit || true
        continue-on-error: true
