name: CI - v2 service tests

# Non-blocking: billing suspension on GitHub-hosted runners must never prevent
# the self-hosted deploy (deploy-v2-king-server.yml) from running.
# All jobs use continue-on-error: true for exactly this reason.
on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "tests/**"
      - "watchers/**"
      - "requirements.txt"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  v2-contract-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run v2 contract tests
        run: python -m unittest tests.v2.test_v2_contract -v

  v2-integration-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          for svc in auth tenant documents storage ai health; do
            python -m pip install -r "services/$svc/requirements.txt"
          done

      - name: Run v2 full-stack integration tests
        run: python -m unittest tests.v2.test_v2_integration_stack

  v2-hardening-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          for svc in auth ai; do
            python -m pip install -r "services/$svc/requirements.txt"
          done
          python -m pip install httpx

      - name: Run v2 hardening regression tests
        run: python -m unittest tests.v2.test_v2_hardening
