name: CI - v2 service tests
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  v2-contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run v2 contract tests
        run: python -m unittest tests.v2.test_v2_contract

  v2-integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          for svc in auth tenant documents storage ai health; do
            python -m pip install -r "services/$svc/requirements.txt"
          done

      - name: Run v2 full-stack integration tests
        run: python -m unittest tests.v2.test_v2_integration_stack
