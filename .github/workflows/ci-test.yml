name: CI - Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-v2:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov fastapi pydantic httpx pyyaml uvicorn
          for svc in auth tenant documents storage ai health; do
            [ -f services/$svc/requirements.txt ] && pip install -r services/$svc/requirements.txt || true
          done

      - name: Run tests (v2 contract + integration)
        run: |
          pytest tests/v2/test_v2_contract.py -v --tb=short
          pytest tests/v2/test_v2_integration_stack.py -v --tb=short
        env:
          GOVOS_ALLOW_DEV_SECRETS: "1"

      - name: Run hardening tests
        run: |
          pytest tests/v2/test_v2_hardening.py -v --tb=short
        env:
          GOVOS_ALLOW_DEV_SECRETS: "1"
        continue-on-error: true

      - name: Coverage report
        run: |
          pip install coverage
          coverage run -m pytest tests/v2/ --tb=short
          coverage report --fail-under=50 || true

  studio-assets-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r services/studio_assets/requirements.txt

      - name: Run Studio asset crosswalk tests
        run: python -m unittest tests.test_studio_assets_crosswalk
