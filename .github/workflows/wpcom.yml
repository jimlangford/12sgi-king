name: Publish Website

# Runs ONLY on manual dispatch. Previously triggered on every push to main,
# burning ubuntu-hosted minutes on every commit and causing billing lockout.
# The self-hosted deploy (deploy-v2-king-server.yml) is the real deployment
# path — it costs zero minutes and can never be billing-gated.
on:
  workflow_dispatch:

jobs:
  Publish-Website:
    name: Publish-Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload the artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpcom
          path: |
            .
            !.git*
          retention-days: 1
