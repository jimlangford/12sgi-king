# nginx configuration snippet for /board proxy routes
# Add this to your nginx server block (typically /etc/nginx/sites-available/default on Linux)
# Or to your nginx.conf if using Windows/WSL

# Proxy requests to /board/api/* to the board-api service on port 8799
location /board/api/ {
    proxy_pass http://127.0.0.1:8799/board/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
}

# Also allow /api/* for direct access (same endpoint)
location /api/ {
    proxy_pass http://127.0.0.1:8799/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;
}
