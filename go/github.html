<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GitHub · Owner Console</title>
<!-- PRIVATE: Tailscale-only. Served from king :8799. Not part of the public GitHub Pages site. -->
<style>
 :root{
   --bg:#ffffff;--panel:#e7eef8;--panel-2:#dae5f3;--panel-3:#ccddef;--line:#bacde6;
   --ink:#13243d;--ink-dim:#41536b;--ink-faint:#5b6e86;
   --accent:#00356b;--accent-2:#1259a3;--accent-ink:#ffffff;--accent-wash:rgba(0,53,107,.06);
   --gold:#b8860b;--ok:#1f8a5b;--warn:#b07d1a;--err:#c0322c;
   --mono:'JetBrains Mono',Consolas,monospace;
 }
 *{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--ink);
      font-family:'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif;
      min-height:100vh;padding:20px 16px 40px;-webkit-font-smoothing:antialiased}
 .wrap{width:100%;max-width:820px;margin:0 auto}
 .back{font-family:var(--mono);font-size:11.5px;color:var(--accent-2);text-decoration:none;display:inline-block;margin-bottom:14px}
 .back:hover{text-decoration:underline}
 .head{display:flex;align-items:center;gap:11px;margin:0 0 4px}
 .seal{width:40px;height:40px;border-radius:10px;background:var(--accent);color:var(--accent-ink);flex:none;
       display:flex;align-items:center;justify-content:center;font-size:19px}
 .brand{font-size:18px;font-weight:800}
 .syslabel{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent-2);font-weight:600}
 .sub{font-size:13px;color:var(--ink-dim);margin:10px 0 14px;line-height:1.55}
 .status{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11.5px;padding:8px 13px;
         border-radius:10px;background:var(--panel);border:1px solid var(--line);margin-bottom:14px;color:var(--ink-dim)}
 .dot{width:9px;height:9px;border-radius:50%;background:var(--warn);animation:pulse 1.2s infinite;flex:none}
 .dot.up{background:var(--ok);animation:none}.dot.down{background:var(--err);animation:none}
 @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
 .sect{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink-faint);margin:18px 2px 9px;font-weight:600}
 .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px}
 a.card-link{display:block;text-decoration:none;color:inherit;background:var(--panel);border:1px solid var(--line);
             border-radius:11px;padding:12px 14px;margin-bottom:9px;transition:border-color .14s}
 a.card-link:hover{border-color:var(--accent)}
 .t{font-size:14px;font-weight:650}.b{font-size:12px;color:var(--ink-dim);margin-top:3px;line-height:1.4}
 .badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.5px;text-transform:uppercase;
        padding:2px 8px;border-radius:6px;font-weight:700;margin-right:5px}
 .badge-ok{background:rgba(31,138,91,.15);color:var(--ok)}
 .badge-warn{background:rgba(176,125,26,.15);color:var(--warn)}
 .badge-err{background:rgba(192,50,44,.15);color:var(--err)}
 .badge-active{background:rgba(18,89,163,.15);color:var(--accent-2)}
 .badge-dim{background:var(--panel-3);color:var(--ink-faint)}
 .ci-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
 .ci-time{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-left:auto}
 .foot{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:22px;line-height:1.7;
       text-align:center;border-top:1px solid var(--line);padding-top:13px}
 button.fix-btn{font-family:var(--mono);font-size:11.5px;padding:6px 13px;border-radius:8px;cursor:pointer;
                border:1px solid var(--line);background:var(--panel);color:var(--accent-2);white-space:nowrap}
 button.fix-btn:hover{border-color:var(--accent)}
 button.retry-btn{font-family:var(--mono);font-size:11.5px;padding:7px 16px;border-radius:8px;
                  background:var(--panel);border:1px solid var(--line);cursor:pointer;color:var(--accent-2)}
 button.retry-btn:hover{border-color:var(--accent)}
 a.fix-link{font-family:var(--mono);font-size:11.5px;padding:6px 13px;border-radius:8px;
            border:1px solid var(--line);background:var(--panel);color:var(--accent-2);
            text-decoration:none;white-space:nowrap;display:inline-block}
 a.fix-link:hover{border-color:var(--accent)}
 details>summary{font-family:var(--mono);font-size:11px;cursor:pointer;color:var(--accent-2);
                  user-select:none;padding:2px 0}
 pre.log-pre{font-family:var(--mono);font-size:10.5px;background:var(--panel);border-radius:7px;
             padding:9px 11px;overflow-x:auto;white-space:pre-wrap;margin:5px 0 0;
             max-height:180px;overflow-y:auto;border:1px solid var(--line)}
</style>
</head><body>
<div class="wrap">
  <a class="back" href="/go">← /go</a>

  <div class="head">
    <div class="seal">⚙</div>
    <div><div class="brand">GitHub</div><div class="syslabel">CI status · Owner Console</div></div>
  </div>
  <p class="sub">GitHub Actions CI runs, open PRs, and recent commits for <b>jimlangford/12sgi-king</b>. Tailscale-only.</p>

  <div class="status" id="status"><span class="dot" id="dot"></span><span id="stext">fetching CI status…</span></div>

  <div id="content" style="display:none">
    <div class="sect">Workflow runs</div>
    <div id="workflowCards"></div>

    <div class="sect">Open pull requests</div>
    <div id="prCards"></div>

    <div class="sect">Recent commits</div>
    <div id="commitCards"></div>
  </div>

  <div id="errSection" style="display:none">
    <div class="sect">Issues detected</div>
    <div id="errCards"></div>
  </div>

  <div class="foot">PRIVATE · GitHub · Owner Console · 12 Stones Global · Tailscale only</div>
</div>
<script>
'use strict';
var API='/board/api/github';
var REPO='jimlangford/12sgi-king';
var REPO_URL='https://github.com/'+REPO;

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function severityStyle(sev){
  var m={critical:['#c0322c','CRITICAL'],high:['#c04a22','HIGH'],medium:['#b07d1a','MEDIUM'],low:['#b8860b','LOW']};
  return m[sev]||['#6d7f97','INFO'];
}

function errCard(o){
  var ss=severityStyle(o.sev), col=ss[0], lbl=ss[1];
  var fixes=(o.fixes||[]).map(function(f){
    if(f.copy) return '<button class="fix-btn" onclick="copyCmd(\''+f.copy.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'+esc(f.lbl)+'</button>';
    if(f.href) return '<a class="fix-link" href="'+esc(f.href)+'" target="_blank" rel="noopener">'+esc(f.lbl)+' →</a>';
    return '';
  }).join(' ');
  return '<div style="border-left:3px solid '+col+';background:rgba(192,50,44,.05);border-radius:10px;padding:13px 15px;margin-bottom:12px">'
    +'<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">'
    +'<span style="font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:6px;font-weight:700;background:'+col+';color:#fff">'+lbl+'</span>'
    +'<span class="t">'+esc(o.what)+'</span></div>'
    +'<div class="b" style="margin-bottom:7px"><b>Likely cause:</b> '+esc(o.cause)+'</div>'
    +'<div class="b" style="margin-bottom:7px"><b>Order of operations:</b><ol style="margin:4px 0 0 18px;padding:0">'+(o.steps||[]).map(function(s){return '<li style="margin-bottom:3px">'+esc(s)+'</li>';}).join('')+'</ol></div>'
    +(fixes?'<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px">'+fixes+'</div>':'')
    +(o.logs?'<details style="margin-bottom:9px"><summary>▶ Logs</summary><pre class="log-pre">'+esc(o.logs)+'</pre></details>':'')
    +'<div class="b" style="margin-bottom:9px"><b>Escalation:</b> '+esc(o.escalate)+'</div>'
    +'<button class="retry-btn" onclick="loadData()">↺ Test again</button>'
    +'</div>';
}

function copyCmd(cmd){
  if(navigator.clipboard){navigator.clipboard.writeText(cmd).then(function(){alert('Copied to clipboard:\n'+cmd);});}
  else{alert('Command:\n'+cmd);}
}

function fmtTs(ts){
  if(!ts) return '';
  try{
    var d=new Date(ts);
    var now=Date.now(), diff=now-d.getTime();
    if(diff<60000) return 'just now';
    if(diff<3600000) return Math.floor(diff/60000)+'m ago';
    if(diff<86400000) return Math.floor(diff/3600000)+'h ago';
    return Math.floor(diff/86400000)+'d ago';
  }catch(_e){return String(ts);}
}

function ciBadge(status, conclusion){
  if(status==='in_progress'||status==='queued') return '<span class="badge badge-active">'+esc(status)+'</span>';
  if(conclusion==='success') return '<span class="badge badge-ok">passed</span>';
  if(conclusion==='failure') return '<span class="badge badge-err">failed</span>';
  if(conclusion==='skipped') return '<span class="badge badge-dim">skipped</span>';
  if(conclusion==='cancelled') return '<span class="badge badge-warn">cancelled</span>';
  if(conclusion) return '<span class="badge badge-dim">'+esc(conclusion)+'</span>';
  return '<span class="badge badge-dim">'+esc(status||'unknown')+'</span>';
}

function renderWorkflows(runs){
  if(!runs||!runs.length){
    return '<div class="card"><div class="b" style="color:var(--ink-faint)">No recent workflow runs found.</div></div>';
  }
  return runs.slice(0,8).map(function(r){
    var url=r.html_url||r.url||REPO_URL+'/actions';
    return '<a class="card-link" href="'+esc(url)+'" target="_blank" rel="noopener">'
      +'<div class="ci-row">'
      +ciBadge(r.status,r.conclusion)
      +'<span class="t">'+esc(r.name||r.workflow||'workflow')+'</span>'
      +'<span class="ci-time">'+fmtTs(r.updated_at||r.created_at)+'</span>'
      +'</div>'
      +'<div class="b">'+esc(r.head_branch||'')+' · '+esc((r.head_sha||'').slice(0,7))+(r.event?' · '+esc(r.event):'')+'</div>'
      +'</a>';
  }).join('');
}

function renderPRs(prs){
  if(!prs||!prs.length){
    return '<div class="card"><div class="b" style="color:var(--ink-faint)">No open pull requests.</div></div>';
  }
  return prs.map(function(pr){
    var url=pr.html_url||pr.url||REPO_URL+'/pulls';
    var ciState=pr.ci_status||pr.check_status;
    var badge=ciState?ciBadge(ciState,pr.ci_conclusion):'';
    return '<a class="card-link" href="'+esc(url)+'" target="_blank" rel="noopener">'
      +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
      +'<span class="badge badge-active">PR #'+esc(pr.number||'?')+'</span>'
      +badge
      +'<span class="t" style="flex:1">'+esc(pr.title||'untitled')+'</span>'
      +'<span class="ci-time">'+fmtTs(pr.updated_at)+'</span>'
      +'</div>'
      +'<div class="b">'+esc(pr.head_branch||pr.head||'')+' → '+esc(pr.base_branch||pr.base||'main')+(pr.author?' · '+esc(pr.author):'')+'</div>'
      +'</a>';
  }).join('');
}

function renderCommits(commits){
  if(!commits||!commits.length){
    return '<div class="card"><div class="b" style="color:var(--ink-faint)">No recent commits found.</div></div>';
  }
  return commits.slice(0,6).map(function(c){
    var url=c.html_url||c.url||REPO_URL+'/commits';
    return '<a class="card-link" href="'+esc(url)+'" target="_blank" rel="noopener">'
      +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
      +'<span style="font-family:var(--mono);font-size:11px;color:var(--accent-2)">'+esc((c.sha||c.hash||'').slice(0,7))+'</span>'
      +'<span class="t" style="flex:1">'+esc((c.message||c.commit_message||'').split('\n')[0].slice(0,80))+'</span>'
      +'<span class="ci-time">'+fmtTs(c.committed_at||c.author_date||c.date)+'</span>'
      +'</div>'
      +(c.author?'<div class="b">'+esc(c.author)+'</div>':'')
      +'</a>';
  }).join('');
}

function showUnreachable(){
  var dot=document.getElementById('dot'), st=document.getElementById('stext');
  dot.className='dot down'; st.textContent='GitHub API unreachable — check Tailscale';
  var sec=document.getElementById('errSection'), cards=document.getElementById('errCards');
  sec.style.display='block';
  cards.innerHTML=errCard({
    what:'GitHub API unreachable',
    cause:'The board API at /board/api/github did not respond. The king server may be offline, Tailscale is disconnected, or the GitHub token is not configured.',
    sev:'critical',
    steps:[
      'Verify Tailscale is connected',
      'Test king connectivity at https://12sgianonymous.tail760750.ts.net/king/',
      'Check that the board API has a GitHub token configured',
      'Verify the token has read access to jimlangford/12sgi-king'
    ],
    fixes:[
      {lbl:'GitHub Actions',href:REPO_URL+'/actions'},
      {lbl:'GitHub repo',href:REPO_URL},
      {lbl:'Tailscale admin',href:'https://login.tailscale.com/admin/machines'}
    ],
    logs:'',
    escalate:'If the board API has no GitHub token, configure GITHUB_TOKEN in the king server environment. If the token is expired, regenerate it in GitHub Settings → Developer Settings → Personal access tokens.',
    retryFn:'loadData'
  });
}

function loadData(){
  var dot=document.getElementById('dot'), st=document.getElementById('stext');
  dot.className='dot'; st.textContent='fetching CI status…';
  document.getElementById('content').style.display='none';
  document.getElementById('errSection').style.display='none';
  document.getElementById('errCards').innerHTML='';

  fetch(API,{cache:'no-store'})
    .then(function(r){return r.ok?r.json():Promise.reject(new Error('HTTP '+r.status));})
    .then(function(d){
      var runs=d.workflow_runs||d.runs||[];
      var prs=d.pull_requests||d.prs||[];
      var commits=d.commits||d.recent_commits||[];
      var hasErrors=false;
      var errHtml='';

      // Check for CI failures
      var failedRuns=runs.filter(function(r){
        return r.conclusion==='failure'&&(r.status==='completed');
      });
      if(failedRuns.length){
        hasErrors=true;
        failedRuns.slice(0,3).forEach(function(r){
          errHtml+=errCard({
            what:'CI failed: '+( r.name||r.workflow||'workflow'),
            cause:'A workflow run completed with failure. Tests may be broken, a linting error was detected, or a deployment step failed.',
            sev:'high',
            steps:[
              'Open the failed run to see which job failed',
              'Read the error log in the failed step',
              'Reproduce locally: git checkout '+esc(r.head_sha||'HEAD')+' && run the failing command',
              'Push a fix and wait for CI to re-run'
            ],
            fixes:[
              {lbl:'View run',href:r.html_url||REPO_URL+'/actions'},
              {lbl:'Copy: checkout SHA',copy:'git fetch origin && git checkout '+esc(r.head_sha||'')}
            ],
            logs:r.failure_summary||'',
            escalate:'If the failure is in a test you cannot reproduce locally, check environment variables in the GitHub repository secrets. If the build environment changed, update the workflow.',
            retryFn:'loadData'
          });
        });
      }

      var inProgress=runs.filter(function(r){return r.status==='in_progress'||r.status==='queued';});
      dot.className=hasErrors?'dot':'dot up';
      st.textContent=(hasErrors?failedRuns.length+' workflow(s) failed · ':'All passing · ')
        +runs.length+' total'+(inProgress.length?' · '+inProgress.length+' running':'');

      document.getElementById('workflowCards').innerHTML=renderWorkflows(runs);
      document.getElementById('prCards').innerHTML=renderPRs(prs);
      document.getElementById('commitCards').innerHTML=renderCommits(commits);

      if(hasErrors){
        document.getElementById('errSection').style.display='block';
        document.getElementById('errCards').innerHTML=errHtml;
      }
      document.getElementById('content').style.display='block';
    })
    .catch(function(){showUnreachable();});
}

loadData();
</script>
</body></html>
