<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Logs · Owner Console</title>
<!-- PRIVATE: Tailscale-only. Served from king :8799. Not part of the public GitHub Pages site. -->
<style>
 :root{
   --bg:#081420;--panel:#0f2540;--panel-2:#dae5f3;--panel-3:#ccddef;--line:#26456a;
   --ink:#eaf2fc;--ink-dim:#41536b;--ink-faint:#5b6e86;
   --accent:#4a9eff;--accent-2:#1259a3;--accent-ink:#ffffff;--accent-wash:rgba(0,53,107,.06);
   --gold:#e3ad33;--ok:#1f8a5b;--warn:#b07d1a;--err:#c0322c;
   --mono:'JetBrains Mono',Consolas,monospace;
 }
 *{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--ink);
      font-family:'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif;
      min-height:100vh;padding:20px 16px 40px;-webkit-font-smoothing:antialiased}
 .wrap{width:100%;max-width:820px;margin:0 auto}
 .back{font-family:var(--mono);font-size:11.5px;color:var(--accent-2);text-decoration:none;display:inline-block;margin-bottom:14px}
 .back:hover{text-decoration:underline}
 .head{display:flex;align-items:center;gap:11px;margin:0 0 4px}
 .seal{width:40px;height:40px;border-radius:10px;background:var(--accent);color:var(--accent-ink);flex:none;
       display:flex;align-items:center;justify-content:center;font-size:19px}
 .brand{font-size:18px;font-weight:800}
 .syslabel{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent-2);font-weight:600}
 .sub{font-size:13px;color:var(--ink-dim);margin:10px 0 14px;line-height:1.55}
 .status{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11.5px;padding:8px 13px;
         border-radius:10px;background:var(--panel);border:1px solid var(--line);margin-bottom:14px;color:var(--ink-dim)}
 .dot{width:9px;height:9px;border-radius:50%;background:var(--warn);animation:pulse 1.2s infinite;flex:none}
 .dot.up{background:var(--ok);animation:none}.dot.down{background:var(--err);animation:none}
 @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
 .sect{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink-faint);margin:18px 2px 9px;font-weight:600}
 .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px}
 .t{font-size:14px;font-weight:650}.b{font-size:12px;color:var(--ink-dim);margin-top:3px;line-height:1.4}
 .filter-bar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:12px}
 .filter-btn{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:8px;cursor:pointer;
             border:1px solid var(--line);background:var(--panel);color:var(--ink-faint);font-weight:600}
 .filter-btn.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
 .filter-btn:hover:not(.active){border-color:var(--accent-2);color:var(--accent-2)}
 .log-stream{background:var(--panel);border:1px solid var(--line);border-radius:11px;
             padding:0;overflow:hidden;max-height:65vh;overflow-y:auto;margin-bottom:9px}
 .log-row{display:flex;align-items:baseline;gap:9px;padding:7px 13px;border-bottom:1px solid var(--line);
          font-family:var(--mono);font-size:11.5px;line-height:1.5}
 .log-row:last-child{border-bottom:0}
 .log-row.err{background:rgba(192,50,44,.06)}
 .log-row.warn{background:rgba(176,125,26,.05)}
 .log-time{color:var(--ink-faint);font-size:10.5px;white-space:nowrap;flex:none}
 .log-src{font-weight:600;white-space:nowrap;min-width:60px;flex:none}
 .log-lvl{font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:1px 6px;border-radius:5px;
           font-weight:700;flex:none}
 .lvl-info{background:rgba(18,89,163,.12);color:var(--accent-2)}
 .lvl-warn{background:rgba(176,125,26,.18);color:var(--warn)}
 .lvl-error{background:rgba(192,50,44,.18);color:var(--err)}
 .lvl-debug{background:var(--panel-3);color:var(--ink-faint)}
 .log-msg{flex:1;word-break:break-word;color:var(--ink-dim)}
 .log-row.err .log-msg{color:var(--ink)}
 .foot{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:22px;line-height:1.7;
       text-align:center;border-top:1px solid var(--line);padding-top:13px}
 button.fix-btn{font-family:var(--mono);font-size:11.5px;padding:6px 13px;border-radius:8px;cursor:pointer;
                border:1px solid var(--line);background:var(--panel);color:var(--accent-2);white-space:nowrap}
 button.fix-btn:hover{border-color:var(--accent)}
 button.retry-btn{font-family:var(--mono);font-size:11.5px;padding:7px 16px;border-radius:8px;
                  background:var(--panel);border:1px solid var(--line);cursor:pointer;color:var(--accent-2)}
 button.retry-btn:hover{border-color:var(--accent)}
 a.fix-link{font-family:var(--mono);font-size:11.5px;padding:6px 13px;border-radius:8px;
            border:1px solid var(--line);background:var(--panel);color:var(--accent-2);
            text-decoration:none;white-space:nowrap;display:inline-block}
 a.fix-link:hover{border-color:var(--accent)}
 details>summary{font-family:var(--mono);font-size:11px;cursor:pointer;color:var(--accent-2);
                  user-select:none;padding:2px 0}
 pre.log-pre{font-family:var(--mono);font-size:10.5px;background:var(--panel);border-radius:7px;
             padding:9px 11px;overflow-x:auto;white-space:pre-wrap;margin:5px 0 0;
             max-height:180px;overflow-y:auto;border:1px solid var(--line)}
</style>
<link rel="stylesheet" href="../govos.css">
</head><body>
<div class="wrap">
  <a class="back" href="/go">← /go</a>

  <div class="head">
    <div class="seal">📋</div>
    <div><div class="brand">Logs</div><div class="syslabel">System log viewer · Owner Console</div></div>
  </div>
  <p class="sub">Recent log entries from all king services — filter by level or source. Tailscale-only.</p>

  <div class="status" id="status"><span class="dot" id="dot"></span><span id="stext">loading logs…</span></div>

  <div id="content" style="display:none">
    <div class="sect">Filter</div>
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" onclick="setLevel('ALL')" id="btn-ALL">All</button>
      <button class="filter-btn" onclick="setLevel('ERROR')" id="btn-ERROR">Error</button>
      <button class="filter-btn" onclick="setLevel('WARN')" id="btn-WARN">Warn</button>
      <button class="filter-btn" onclick="setLevel('INFO')" id="btn-INFO">Info</button>
      <button class="filter-btn" onclick="setLevel('DEBUG')" id="btn-DEBUG">Debug</button>
      <button class="fix-btn" onclick="loadData()" style="margin-left:auto">↺ Refresh</button>
    </div>

    <div class="sect" id="logSectLabel">Recent entries</div>
    <div class="log-stream" id="logStream"></div>

    <div class="sect">Error summary</div>
    <div id="errorSummary"></div>
  </div>

  <div id="errSection" style="display:none">
    <div class="sect">Issues detected</div>
    <div id="errCards"></div>
  </div>

  <div class="foot">PRIVATE · Logs · Owner Console · 12 Stones Global · Tailscale only</div>
</div>
<script>
'use strict';
var API='./api/logs';
var allEntries=[];
var activeLevel='ALL';

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function severityStyle(sev){
  var m={critical:['#c0322c','CRITICAL'],high:['#c04a22','HIGH'],medium:['#b07d1a','MEDIUM'],low:['#b8860b','LOW']};
  return m[sev]||['#6d7f97','INFO'];
}

function errCard(o){
  var ss=severityStyle(o.sev), col=ss[0], lbl=ss[1];
  var fixes=(o.fixes||[]).map(function(f){
    if(f.copy) return '<button class="fix-btn" onclick="copyCmd(\''+f.copy.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'+esc(f.lbl)+'</button>';
    if(f.href) return '<a class="fix-link" href="'+esc(f.href)+'" target="_blank" rel="noopener">'+esc(f.lbl)+' →</a>';
    return '';
  }).join(' ');
  return '<div style="border-left:3px solid '+col+';background:rgba(192,50,44,.05);border-radius:10px;padding:13px 15px;margin-bottom:12px">'
    +'<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">'
    +'<span style="font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:6px;font-weight:700;background:'+col+';color:#fff">'+lbl+'</span>'
    +'<span class="t">'+esc(o.what)+'</span></div>'
    +'<div class="b" style="margin-bottom:7px"><b>Likely cause:</b> '+esc(o.cause)+'</div>'
    +'<div class="b" style="margin-bottom:7px"><b>Order of operations:</b><ol style="margin:4px 0 0 18px;padding:0">'+(o.steps||[]).map(function(s){return '<li style="margin-bottom:3px">'+esc(s)+'</li>';}).join('')+'</ol></div>'
    +(fixes?'<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px">'+fixes+'</div>':'')
    +(o.logs?'<details style="margin-bottom:9px"><summary>▶ Logs</summary><pre class="log-pre">'+esc(o.logs)+'</pre></details>':'')
    +'<div class="b" style="margin-bottom:9px"><b>Escalation:</b> '+esc(o.escalate)+'</div>'
    +'<button class="retry-btn" onclick="loadData()">↺ Test again</button>'
    +'</div>';
}

function copyCmd(cmd){
  if(navigator.clipboard){navigator.clipboard.writeText(cmd).then(function(){alert('Copied to clipboard:\n'+cmd);});}
  else{alert('Command:\n'+cmd);}
}

function fmtTs(ts){
  if(!ts)return '';
  try{
    var d=new Date(typeof ts==='number'&&ts<1e12?ts*1000:ts);
    return d.toLocaleTimeString();
  }catch(_e){return String(ts);}
}

function levelClass(level){
  if(!level)return 'lvl-info';
  var l=level.toUpperCase();
  if(l==='ERROR'||l==='CRITICAL'||l==='FATAL') return 'lvl-error';
  if(l==='WARN'||l==='WARNING') return 'lvl-warn';
  if(l==='DEBUG'||l==='TRACE') return 'lvl-debug';
  return 'lvl-info';
}

function rowClass(level){
  if(!level)return '';
  var l=level.toUpperCase();
  if(l==='ERROR'||l==='CRITICAL'||l==='FATAL') return 'err';
  if(l==='WARN'||l==='WARNING') return 'warn';
  return '';
}

function srcColor(src){
  var m={docker:'var(--accent)',ollama:'#7a3fb0',comfyui:'#a23fb0',github:'var(--ink-dim)',board:'var(--accent-2)',nginx:'var(--gold)',system:'var(--ok)'};
  return m[(src||'').toLowerCase()]||'var(--ink-faint)';
}

function renderEntries(entries){
  if(!entries||!entries.length){
    return '<div class="log-row"><span class="log-msg" style="color:var(--ink-faint)">No log entries match this filter.</span></div>';
  }
  return entries.slice(0,200).map(function(e){
    var level=(e.level||e.severity||'INFO').toUpperCase();
    var src=e.source||e.service||e.logger||'';
    var msg=e.msg||e.message||e.text||'';
    var rc=rowClass(level);
    return '<div class="log-row '+(rc)+'"><span class="log-time">'+fmtTs(e.ts||e.timestamp||e.time)+'</span>'
      +(src?'<span class="log-src" style="color:'+srcColor(src)+'">'+esc(src)+'</span>':'')
      +'<span class="log-lvl '+levelClass(level)+'">'+esc(level)+'</span>'
      +'<span class="log-msg">'+esc(msg)+'</span>'
      +'</div>';
  }).join('');
}

function renderErrorSummary(entries){
  var errors=entries.filter(function(e){
    var l=(e.level||'').toUpperCase();
    return l==='ERROR'||l==='CRITICAL'||l==='FATAL';
  });
  if(!errors.length){
    return '<div class="card"><div class="b" style="color:var(--ok)">✓ No errors in the log window.</div></div>';
  }
  // Group by source
  var bySrc={};
  errors.forEach(function(e){
    var src=e.source||e.service||'unknown';
    if(!bySrc[src])bySrc[src]=[];
    bySrc[src].push(e);
  });
  return Object.keys(bySrc).map(function(src){
    var errs=bySrc[src];
    var recent=errs[errs.length-1];
    return errCard({
      what:errs.length+' error(s) from: '+src,
      cause:'Service '+src+' logged '+errs.length+' error(s) in the current log window. Most recent: '+(recent.msg||recent.message||'').slice(0,120),
      sev:errs.length>=5?'high':'medium',
      steps:[
        'Read the error messages in the log stream above',
        'Identify the first occurrence of the error (scroll up to find root cause)',
        'Check the service status on its dedicated console page',
        'Restart the affected service if it is crashing'
      ],
      fixes:[
        {lbl:'Copy: tail service logs',copy:'journalctl -u '+src+' --since "1 hour ago" | tail -50'}
      ],
      logs:errs.slice(-5).map(function(e){return '['+fmtTs(e.ts||e.timestamp)+'] '+(e.msg||e.message||'');}).join('\n'),
      escalate:'If the errors are recurring without a known cause, check the service console page for detailed diagnostics.',
      retryFn:'loadData'
    });
  }).join('');
}

function setLevel(level){
  activeLevel=level;
  // Update button states
  ['ALL','ERROR','WARN','INFO','DEBUG'].forEach(function(l){
    var btn=document.getElementById('btn-'+l);
    if(btn)btn.className='filter-btn'+(l===level?' active':'');
  });
  // Re-render with filter
  var filtered=allEntries.filter(function(e){
    if(level==='ALL')return true;
    var l=(e.level||e.severity||'').toUpperCase();
    if(level==='ERROR')return l==='ERROR'||l==='CRITICAL'||l==='FATAL';
    if(level==='WARN')return l==='WARN'||l==='WARNING';
    if(level==='INFO')return l==='INFO';
    if(level==='DEBUG')return l==='DEBUG'||l==='TRACE';
    return true;
  });
  document.getElementById('logSectLabel').textContent='Recent entries ('+filtered.length+(filtered.length===200?'+':'')+')';
  document.getElementById('logStream').innerHTML=renderEntries(filtered);
}

function showUnreachable(){
  var dot=document.getElementById('dot'), st=document.getElementById('stext');
  dot.className='dot down'; st.textContent='Log API unreachable — check Tailscale';
  var sec=document.getElementById('errSection'), cards=document.getElementById('errCards');
  sec.style.display='block';
  cards.innerHTML=errCard({
    what:'Log API unreachable',
    cause:'The board API at /board/api/logs did not respond. The king server may be offline or Tailscale is disconnected.',
    sev:'critical',
    steps:[
      'Verify Tailscale is connected on this device',
      'Open https://king.tail760750.ts.net/king/ to test connectivity',
      'Check that the king board API is running on port 8782',
      'Verify the /board/api/logs endpoint is implemented in the board server'
    ],
    fixes:[
      {lbl:'Tailscale admin',href:'https://login.tailscale.com/admin/machines'},
      {lbl:'Test king',href:'https://king.tail760750.ts.net/king/'}
    ],
    logs:'',
    escalate:'If the board API is running but /board/api/logs is not available, the endpoint may need to be added to the board server. Check board server implementation.',
    retryFn:'loadData'
  });
}

function loadData(){
  var dot=document.getElementById('dot'), st=document.getElementById('stext');
  dot.className='dot'; st.textContent='loading logs…';
  document.getElementById('content').style.display='none';
  document.getElementById('errSection').style.display='none';
  document.getElementById('errCards').innerHTML='';

  fetch(API,{cache:'no-store'})
    .then(function(r){return r.ok?r.json():Promise.reject(new Error('HTTP '+r.status));})
    .then(function(d){
      var entries=d.entries||d.logs||d.lines||[];
      allEntries=entries;

      var errCount=entries.filter(function(e){
        var l=(e.level||'').toUpperCase();
        return l==='ERROR'||l==='CRITICAL'||l==='FATAL';
      }).length;

      dot.className=errCount>0?'dot':'dot up';
      st.textContent=errCount>0
        ?errCount+' error(s) in last '+entries.length+' entries'
        :'Clean log · '+entries.length+' entries';

      document.getElementById('errorSummary').innerHTML=renderErrorSummary(entries);
      setLevel(activeLevel); // applies current filter and renders
      document.getElementById('content').style.display='block';
    })
    .catch(function(){showUnreachable();});
}

loadData();
</script>
<script src="../govos-shell.js" defer></script>
</body></html>
