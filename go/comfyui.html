<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ComfyUI · Owner Console</title>
<!-- PRIVATE: Tailscale-only. Served from king :8799. Not part of the public GitHub Pages site. -->
<style>
 :root{
   --bg:#ffffff;--panel:#e7eef8;--panel-2:#dae5f3;--panel-3:#ccddef;--line:#bacde6;
   --ink:#13243d;--ink-dim:#41536b;--ink-faint:#5b6e86;
   --accent:#00356b;--accent-2:#1259a3;--accent-ink:#ffffff;--accent-wash:rgba(0,53,107,.06);
   --gold:#b8860b;--ok:#1f8a5b;--warn:#b07d1a;--err:#c0322c;
   --mono:'JetBrains Mono',Consolas,monospace;
 }
 *{box-sizing:border-box}
 body{margin:0;background:var(--bg);color:var(--ink);
      font-family:'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif;
      min-height:100vh;padding:20px 16px 40px;-webkit-font-smoothing:antialiased}
 .wrap{width:100%;max-width:820px;margin:0 auto}
 .back{font-family:var(--mono);font-size:11.5px;color:var(--accent-2);text-decoration:none;display:inline-block;margin-bottom:14px}
 .back:hover{text-decoration:underline}
 .head{display:flex;align-items:center;gap:11px;margin:0 0 4px}
 .seal{width:40px;height:40px;border-radius:10px;background:var(--accent);color:var(--accent-ink);flex:none;
       display:flex;align-items:center;justify-content:center;font-size:19px}
 .brand{font-size:18px;font-weight:800}
 .syslabel{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent-2);font-weight:600}
 .sub{font-size:13px;color:var(--ink-dim);margin:10px 0 14px;line-height:1.55}
 .status{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11.5px;padding:8px 13px;
         border-radius:10px;background:var(--panel);border:1px solid var(--line);margin-bottom:14px;color:var(--ink-dim)}
 .dot{width:9px;height:9px;border-radius:50%;background:var(--warn);animation:pulse 1.2s infinite;flex:none}
 .dot.up{background:var(--ok);animation:none}.dot.down{background:var(--err);animation:none}
 @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
 .sect{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--ink-faint);margin:18px 2px 9px;font-weight:600}
 .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px}
 .t{font-size:14px;font-weight:650}.b{font-size:12px;color:var(--ink-dim);margin-top:3px;line-height:1.4}
 .badge{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.5px;text-transform:uppercase;
        padding:2px 8px;border-radius:6px;font-weight:700;margin-right:5px}
 .badge-ok{background:rgba(31,138,91,.15);color:var(--ok)}
 .badge-warn{background:rgba(176,125,26,.15);color:var(--warn)}
 .badge-err{background:rgba(192,50,44,.15);color:var(--err)}
 .badge-active{background:rgba(18,89,163,.15);color:var(--accent-2)}
 .badge-dim{background:var(--panel-3);color:var(--ink-faint)}
 .bar-wrap{height:6px;border-radius:99px;background:var(--panel-3);overflow:hidden;margin:6px 0 4px}
 .bar-fill{height:100%;border-radius:99px}
 .bar-fill.ok{background:linear-gradient(90deg,var(--ok),#2aad73)}
 .bar-fill.warn{background:linear-gradient(90deg,var(--warn),#d49a20)}
 .bar-fill.err{background:linear-gradient(90deg,var(--err),#e05060)}
 .queue-item{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--line)}
 .queue-item:last-child{border-bottom:0;padding-bottom:0}
 .queue-num{font-family:var(--mono);font-size:11px;color:var(--ink-faint);width:28px;flex:none;padding-top:1px}
 .foot{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);margin-top:22px;line-height:1.7;
       text-align:center;border-top:1px solid var(--line);padding-top:13px}
 button.fix-btn{font-family:var(--mono);font-size:11.5px;padding:6px 13px;border-radius:8px;cursor:pointer;
                border:1px solid var(--line);background:var(--panel);color:var(--accent-2);white-space:nowrap}
 button.fix-btn:hover{border-color:var(--accent)}
 button.retry-btn{font-family:var(--mono);font-size:11.5px;padding:7px 16px;border-radius:8px;
                  background:var(--panel);border:1px solid var(--line);cursor:pointer;color:var(--accent-2)}
 button.retry-btn:hover{border-color:var(--accent)}
 a.fix-link{font-family:var(--mono);font-size:11.5px;padding:6px 13px;border-radius:8px;
            border:1px solid var(--line);background:var(--panel);color:var(--accent-2);
            text-decoration:none;white-space:nowrap;display:inline-block}
 a.fix-link:hover{border-color:var(--accent)}
 details>summary{font-family:var(--mono);font-size:11px;cursor:pointer;color:var(--accent-2);
                  user-select:none;padding:2px 0}
 pre.log-pre{font-family:var(--mono);font-size:10.5px;background:var(--panel);border-radius:7px;
             padding:9px 11px;overflow-x:auto;white-space:pre-wrap;margin:5px 0 0;
             max-height:180px;overflow-y:auto;border:1px solid var(--line)}
</style>
</head><body>
<div class="wrap">
  <a class="back" href="/go">← /go</a>

  <div class="head">
    <div class="seal">🎨</div>
    <div><div class="brand">ComfyUI</div><div class="syslabel">Diffusion queue · Owner Console</div></div>
  </div>
  <p class="sub">ComfyUI render queue, active job, and GPU status — studio diffusion pipeline. Tailscale-only.</p>

  <div class="status" id="status"><span class="dot" id="dot"></span><span id="stext">checking ComfyUI…</span></div>

  <div id="content" style="display:none">
    <div class="sect">Active job</div>
    <div id="activeJob"></div>

    <div class="sect">GPU</div>
    <div class="card">
      <div style="display:flex;gap:14px;flex-wrap:wrap">
        <div style="flex:1;min-width:140px">
          <div class="b" style="margin-bottom:2px">VRAM</div>
          <div class="bar-wrap"><div class="bar-fill" id="vramBar" style="width:0%"></div></div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--ink-faint)" id="vramText">—</div>
        </div>
        <div style="flex:1;min-width:140px">
          <div class="b" style="margin-bottom:2px">Temperature</div>
          <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent)" id="gpuTemp">—</div>
        </div>
      </div>
    </div>

    <div class="sect">Queue</div>
    <div id="queueCards"></div>
  </div>

  <div id="errSection" style="display:none">
    <div class="sect">Issues detected</div>
    <div id="errCards"></div>
  </div>

  <div class="foot">PRIVATE · ComfyUI · Owner Console · 12 Stones Global · Tailscale only</div>
</div>
<script>
'use strict';
var API='/board/api/comfyui';

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function severityStyle(sev){
  var m={critical:['#c0322c','CRITICAL'],high:['#c04a22','HIGH'],medium:['#b07d1a','MEDIUM'],low:['#b8860b','LOW']};
  return m[sev]||['#6d7f97','INFO'];
}

function errCard(o){
  var ss=severityStyle(o.sev), col=ss[0], lbl=ss[1];
  var fixes=(o.fixes||[]).map(function(f){
    if(f.copy) return '<button class="fix-btn" onclick="copyCmd(\''+f.copy.replace(/\\/g,'\\\\').replace(/'/g,"\\'")+'\')">'+esc(f.lbl)+'</button>';
    if(f.href) return '<a class="fix-link" href="'+esc(f.href)+'" target="_blank" rel="noopener">'+esc(f.lbl)+' →</a>';
    return '';
  }).join(' ');
  return '<div style="border-left:3px solid '+col+';background:rgba(192,50,44,.05);border-radius:10px;padding:13px 15px;margin-bottom:12px">'
    +'<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">'
    +'<span style="font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:6px;font-weight:700;background:'+col+';color:#fff">'+lbl+'</span>'
    +'<span class="t">'+esc(o.what)+'</span></div>'
    +'<div class="b" style="margin-bottom:7px"><b>Likely cause:</b> '+esc(o.cause)+'</div>'
    +'<div class="b" style="margin-bottom:7px"><b>Order of operations:</b><ol style="margin:4px 0 0 18px;padding:0">'+(o.steps||[]).map(function(s){return '<li style="margin-bottom:3px">'+esc(s)+'</li>';}).join('')+'</ol></div>'
    +(fixes?'<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px">'+fixes+'</div>':'')
    +(o.logs?'<details style="margin-bottom:9px"><summary>▶ Logs</summary><pre class="log-pre">'+esc(o.logs)+'</pre></details>':'')
    +'<div class="b" style="margin-bottom:9px"><b>Escalation:</b> '+esc(o.escalate)+'</div>'
    +'<button class="retry-btn" onclick="loadData()">↺ Test again</button>'
    +'</div>';
}

function copyCmd(cmd){
  if(navigator.clipboard){navigator.clipboard.writeText(cmd).then(function(){alert('Copied to clipboard:\n'+cmd);});}
  else{alert('Command:\n'+cmd);}
}

function fmtSize(bytes){
  if(!bytes)return '?';
  if(bytes>=1e9)return (bytes/1e9).toFixed(1)+'GB';
  if(bytes>=1e6)return (bytes/1e6).toFixed(1)+'MB';
  return bytes+'B';
}

function barClass(pct){
  if(pct>=90)return 'err';
  if(pct>=75)return 'warn';
  return 'ok';
}

function renderActiveJob(running){
  if(!running||!running.length){
    return '<div class="card"><div class="b" style="color:var(--ink-faint)">No active render — ComfyUI idle.</div></div>';
  }
  return running.map(function(j){
    var pct=j.progress!=null?Math.round(j.progress*100):0;
    var barcl=pct<30?'warn':'ok';
    return '<div class="card">'
      +'<div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">'
      +'<span class="badge badge-active">rendering</span>'
      +'<span class="t">'+esc(j.prompt_id||j.id||'job')+'</span>'
      +'<span class="b" style="margin:0">'+pct+'%</span>'
      +'</div>'
      +'<div class="bar-wrap"><div class="bar-fill '+barcl+'" style="width:'+pct+'%"></div></div>'
      +'<div class="b">node: '+esc(j.node||j.current_node||'—')+' · step: '+esc(j.value||'—')+' of '+esc(j.max||'—')+'</div>'
      +'</div>';
  }).join('');
}

function renderQueue(pending){
  if(!pending||!pending.length){
    return '<div class="card"><div class="b" style="color:var(--ink-faint)">Queue empty.</div></div>';
  }
  return '<div class="card" style="padding:10px 14px">'
    +pending.map(function(j,i){
      return '<div class="queue-item">'
        +'<span class="queue-num">#'+(i+1)+'</span>'
        +'<div style="flex:1"><div class="t" style="font-size:12.5px">'+esc(j.prompt_id||j.id||'job')+'</div>'
        +'<div class="b">queued</div></div>'
        +'</div>';
    }).join('')
    +'</div>';
}

function showUnreachable(){
  var dot=document.getElementById('dot'), st=document.getElementById('stext');
  dot.className='dot down'; st.textContent='ComfyUI unreachable — check Tailscale';
  var sec=document.getElementById('errSection'), cards=document.getElementById('errCards');
  sec.style.display='block';
  cards.innerHTML=errCard({
    what:'ComfyUI API unreachable',
    cause:'Could not reach /board/api/comfyui. ComfyUI may be stopped, or Tailscale is disconnected.',
    sev:'critical',
    steps:[
      'Verify Tailscale is connected',
      'Check if ComfyUI is running on port 8188',
      'Start ComfyUI: cd ComfyUI && python main.py --listen',
      'Verify the board API proxies /board/api/comfyui to port 8782'
    ],
    fixes:[
      {lbl:'Copy: start ComfyUI',copy:'cd ~/ComfyUI && python main.py --listen'},
      {lbl:'Copy: check port',copy:'curl http://localhost:8188/queue'},
      {lbl:'Tailscale admin',href:'https://login.tailscale.com/admin/machines'}
    ],
    logs:'',
    escalate:'If ComfyUI is running but the board API cannot reach it, check the board server configuration and ensure port 8188 is accessible locally.',
    retryFn:'loadData'
  });
}

function loadData(){
  var dot=document.getElementById('dot'), st=document.getElementById('stext');
  dot.className='dot'; st.textContent='checking ComfyUI…';
  document.getElementById('content').style.display='none';
  document.getElementById('errSection').style.display='none';
  document.getElementById('errCards').innerHTML='';

  fetch(API,{cache:'no-store'})
    .then(function(r){return r.ok?r.json():Promise.reject(new Error('HTTP '+r.status));})
    .then(function(d){
      var running=d.queue_running||d.running||[];
      var pending=d.queue_pending||d.pending||[];
      var hasErrors=false;
      var errHtml='';

      // GPU stats
      var vramUsed=d.vram_used||d.gpu_vram_used||0;
      var vramTotal=d.vram_total||d.gpu_vram_total||0;
      var gpuTemp=d.gpu_temp||d.temperature||null;

      if(vramTotal>0){
        var vramPct=Math.round(vramUsed/vramTotal*100);
        var bar=document.getElementById('vramBar'), txt=document.getElementById('vramText');
        bar.style.width=vramPct+'%';
        bar.className='bar-fill '+barClass(vramPct);
        txt.textContent=fmtSize(vramUsed)+' / '+fmtSize(vramTotal)+' ('+vramPct+'%)';
        if(vramPct>=90){
          hasErrors=true;
          errHtml+=errCard({
            what:'VRAM critically full ('+vramPct+'%)',
            cause:'GPU memory is nearly exhausted. ComfyUI may fail to start new renders with CUDA out-of-memory errors.',
            sev:'high',
            steps:[
              'Finish the current queue before starting new renders',
              'Unload Ollama models if any are loaded',
              'Reduce batch size or resolution in the workflow',
              'Monitor with: nvidia-smi dmon'
            ],
            fixes:[
              {lbl:'Copy: check VRAM',copy:'nvidia-smi --query-gpu=memory.used,memory.total --format=csv,noheader'},
              {lbl:'Copy: monitor GPU',copy:'nvidia-smi dmon -d 2'}
            ],
            logs:'',
            escalate:'If VRAM is consistently full across workloads, consider offloading Ollama or reducing ComfyUI VRAM allocation.',
            retryFn:'loadData'
          });
        }
      } else {
        document.getElementById('vramBar').parentElement.parentElement.style.display='none';
      }

      if(gpuTemp!=null){
        var tmp=document.getElementById('gpuTemp');
        var tempNum=parseFloat(gpuTemp);
        tmp.textContent=gpuTemp+'°C';
        tmp.style.color=tempNum>=85?'var(--err)':tempNum>=75?'var(--warn)':'var(--ok)';
        if(tempNum>=85){
          hasErrors=true;
          errHtml+=errCard({
            what:'GPU overheating ('+gpuTemp+'°C)',
            cause:'GPU temperature is critically high. Thermal throttling or shutdown may occur, interrupting renders.',
            sev:'critical',
            steps:[
              'Pause rendering immediately',
              'Check airflow and fan operation',
              'Verify case cooling and GPU fan speed: nvidia-smi -q -d TEMPERATURE',
              'Allow GPU to cool before resuming'
            ],
            fixes:[
              {lbl:'Copy: GPU temp',copy:'nvidia-smi -q -d TEMPERATURE'},
              {lbl:'Copy: fan speed',copy:'nvidia-smi --query-gpu=fan.speed,temperature.gpu --format=csv,noheader'}
            ],
            logs:'',
            escalate:'If the temperature stays high with no load, the GPU cooling system may require physical inspection or thermal paste replacement.',
            retryFn:'loadData'
          });
        }
      } else {
        document.getElementById('gpuTemp').textContent='—';
      }

      // Check for stuck jobs (running for too long)
      running.forEach(function(j){
        if(j.elapsed_s&&j.elapsed_s>600){
          hasErrors=true;
          errHtml+=errCard({
            what:'Possibly stuck render ('+Math.round(j.elapsed_s/60)+'min)',
            cause:'A render has been running for over 10 minutes without completion. It may be stuck on a slow node or an OOM error occurred silently.',
            sev:'medium',
            steps:[
              'Check ComfyUI console output for errors',
              'Look at the current node progress in the UI',
              'Verify GPU utilization: nvidia-smi',
              'Restart ComfyUI if progress has not advanced for 5+ minutes'
            ],
            fixes:[
              {lbl:'Copy: GPU util',copy:'nvidia-smi --query-gpu=utilization.gpu,memory.used --format=csv,noheader'},
              {lbl:'Open ComfyUI UI',href:'http://localhost:8188'}
            ],
            logs:'',
            escalate:'If the render is truly stuck, restart ComfyUI. The queue will clear and you can re-submit the workflow.',
            retryFn:'loadData'
          });
        }
      });

      dot.className=hasErrors?'dot':'dot up';
      st.textContent=running.length
        ?(running.length)+' rendering · '+pending.length+' pending'
        :'Idle · '+pending.length+' pending';

      document.getElementById('activeJob').innerHTML=renderActiveJob(running);
      document.getElementById('queueCards').innerHTML=renderQueue(pending);

      if(hasErrors){
        document.getElementById('errSection').style.display='block';
        document.getElementById('errCards').innerHTML=errHtml;
      }
      document.getElementById('content').style.display='block';
    })
    .catch(function(){showUnreachable();});
}

loadData();
</script>
</body></html>
