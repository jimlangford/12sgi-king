<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="../../govos.css">
</head>
<body>
<x-dc>
<helmet>
  <script src="./ds-base.js"></script>
</helmet>

<!-- Aupuni Globe panel — embeds aupuni.html as an iframe within the Naga shell.
     The globe uses complex external scripts (Three.js / canvas), so an iframe
     is the safest host without re-implementing the render pipeline.
     The iframe is sandboxed to allow-scripts, allow-same-origin. -->
<div data-surface="aupuni" data-screen-label="Aupuni constellation"
  style="display:flex; flex-direction:column; min-height:100%; background:var(--app-backdrop,#0c0b09);">

  <!-- Panel header -->
  <div style="padding:14px clamp(14px,2.5vw,24px) 12px; border-bottom:1px solid var(--line,#34301f); flex-shrink:0;">
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--ink-faint,#756b56); margin-bottom:4px;">ka lani · the heavens above</div>
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
      <h2 style="margin:0; font-size:clamp(16px,2.4vw,22px); font-weight:700; letter-spacing:0.2px; color:var(--ink,#efe9da);">Aupuni constellation</h2>
      <span style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent,#e3ad33); background:rgba(227,173,51,.1); border:1px solid rgba(227,173,51,.3); border-radius:20px; padding:3px 10px;">16 tenants · 1 moon</span>
    </div>
    <p style="margin:5px 0 0; font-size:12.5px; color:var(--ink-dim,#b3a98f);">The sun crosses the living globe · each tenant tends its work by day, heals at pau hana. Powered by elementLOTUS.</p>
  </div>

  <!-- Globe iframe (fills remaining height) -->
  <div style="flex:1; min-height:0; position:relative;">
    <iframe
      id="aupuni-frame"
      src="./aupuni.html"
      sandbox="allow-scripts allow-same-origin allow-popups"
      style="display:block; width:100%; height:100%; min-height:600px; border:none; background:#0c0b09;"
      title="Aupuni constellation globe"
      loading="lazy"
    ></iframe>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
/* Aupuni panel — thin wrapper around the standalone aupuni.html globe.
   The globe's Three.js / canvas pipeline runs inside the iframe context. */
class Component extends DCLogic {
  state = {};

  renderVals() {
    return {};
  }
}
</script>
<script src="../../govos-shell.js" defer></script>
</body>
</html>
