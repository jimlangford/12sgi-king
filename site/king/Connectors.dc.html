<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="../../govos.css">
</head>
<body>
<x-dc>
<helmet>
  <script src="./ds-base.js"></script>
</helmet>

<!-- Connectors panel — owner-gated within the Naga shell.
     Shows per-platform OAuth token health, pending drafts, and batch-approve.
     Mirrors the SOCIAL_CONNECTORS.md lifecycle: BUILD → STAGE → REVIEW → PUBLISH.
     Publishing only happens after explicit owner approval here. -->
<div data-surface="connectors" data-screen-label="Naga Connectors"
  style="min-height:100%; background:var(--app-backdrop,#0c0b09); color:var(--ink,#efe9da); font-family:'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif; font-size:14px;">

  <!-- Panel header -->
  <div style="display:flex; align-items:center; gap:10px; padding:14px clamp(14px,2.5vw,28px); border-bottom:1px solid var(--line,#34301f);">
    <span style="font-size:18px; color:var(--accent,#e3ad33);">🔗</span>
    <div>
      <div style="font-weight:700; font-size:15px; letter-spacing:0.3px;">12sgi · Naga</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.6px; text-transform:uppercase; color:var(--ink-faint,#756b56);">MCP Connectors</div>
    </div>
    <span style="margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; background:rgba(227,173,51,0.14); color:var(--accent,#e3ad33); border:1px solid var(--accent,#e3ad33); border-radius:20px; padding:3px 10px;">owner · private</span>
  </div>

  <div style="max-width:820px; padding:0 clamp(14px,2.5vw,28px) 60px; margin:0 auto;">

    <!-- ── Connector health ── -->
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--ink-faint,#756b56); border-bottom:1px solid var(--line,#34301f); padding:22px 0 6px; margin-bottom:12px;">
      Platform Connectors
      <button id="conn-refresh-btn" onclick="loadConnectors()"
        style="float:right; font-family:inherit; font-size:10px; letter-spacing:1.2px; text-transform:uppercase; background:rgba(227,173,51,0.12); color:var(--accent,#e3ad33); border:1px solid var(--accent,#e3ad33); border-radius:14px; padding:3px 10px; cursor:pointer;">↻ Refresh</button>
    </div>

    <div id="conn-note" style="display:none; background:var(--panel,#16140f); border:1px solid var(--line,#34301f); border-radius:10px; padding:11px 14px; font-size:12.5px; color:var(--ink-dim,#b3a98f); margin-bottom:12px;">
      Loading connector status…
    </div>

    <div id="conn-grid" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; margin-bottom:24px;"></div>

    <!-- ── Pending approvals ── -->
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--ink-faint,#756b56); border-bottom:1px solid var(--line,#34301f); padding:18px 0 6px; margin-bottom:12px;">
      Pending Approvals
      <button id="approve-all-btn" onclick="approveAll()"
        style="float:right; font-family:inherit; font-size:10px; letter-spacing:1.2px; text-transform:uppercase; background:rgba(106,191,134,0.15); color:#6abf86; border:1px solid #6abf86; border-radius:14px; padding:3px 10px; cursor:pointer;">✓ Approve All</button>
    </div>

    <div id="pending-note" style="background:var(--panel,#16140f); border:1px solid var(--line,#34301f); border-radius:10px; padding:11px 14px; font-size:12.5px; color:var(--ink-dim,#b3a98f); margin-bottom:12px;">
      Loading pending items…
    </div>

    <div id="pending-list"></div>

    <!-- ── Batch result ── -->
    <div id="batch-result" style="display:none; border-radius:10px; padding:13px 16px; margin-top:14px; font-size:13px;"></div>

  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const KING_NODE_URL = (typeof window.__KING_NODE_URL !== 'undefined')
  ? window.__KING_NODE_URL
  : 'http://12sgi-v2:8088';   // Tailscale MagicDNS — only reachable by owner

function ownerToken() {
  return localStorage.getItem('king.ownerToken') || '';
}

function authHeaders() {
  const t = ownerToken();
  return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
}

// ── Status styling helpers ────────────────────────────────────────────────────
const STATUS_STYLES = {
  valid:       { bg: 'rgba(106,191,134,0.14)', color: '#6abf86',  border: '#6abf86',  glyph: '●', label: 'Active' },
  refreshable: { bg: 'rgba(210,153,34,0.14)',  color: '#d29922',  border: '#d29922',  glyph: '⟳', label: 'Refreshing' },
  needs_auth:  { bg: 'rgba(229,115,107,0.14)', color: '#e5736b',  border: '#e5736b',  glyph: '⚠', label: 'Needs Auth' },
};

const PLATFORM_ICONS = {
  wordpress: '🔵', youtube: '▶️', tiktok: '🎵', facebook: '📘', linkedin: '💼',
};

function statusStyle(status) {
  return STATUS_STYLES[status] || STATUS_STYLES.needs_auth;
}

// ── Load connector status ─────────────────────────────────────────────────────
async function loadConnectors() {
  const note = document.getElementById('conn-note');
  const grid = document.getElementById('conn-grid');
  note.style.display = 'block';
  note.textContent = 'Loading connector status…';
  grid.innerHTML = '';

  try {
    const resp = await fetch(`${KING_NODE_URL}/connectors`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    note.style.display = 'none';
    renderConnectorGrid(data.connectors || []);
  } catch (err) {
    note.textContent = `Could not reach owner node: ${err.message}. Are you on Tailscale?`;
  }
}

function renderConnectorGrid(connectors) {
  const grid = document.getElementById('conn-grid');
  grid.innerHTML = '';
  if (!connectors.length) {
    grid.innerHTML = '<div style="color:var(--ink-dim,#b3a98f); font-size:13px;">No connectors configured.</div>';
    return;
  }
  for (const c of connectors) {
    const s = statusStyle(c.status);
    const expiresLabel = c.expires_in_seconds != null
      ? (c.expires_in_seconds > 3600
          ? `expires in ${Math.round(c.expires_in_seconds/3600)}h`
          : c.expires_in_seconds > 0
            ? `expires in ${Math.round(c.expires_in_seconds/60)}m`
            : 'expired')
      : (c.status === 'valid' ? 'no expiry' : '—');

    const card = document.createElement('div');
    card.style.cssText = `background:var(--panel,#16140f); border:1px solid ${s.border}; border-radius:12px; padding:14px 15px;`;
    card.innerHTML = `
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
        <span style="font-size:20px;">${PLATFORM_ICONS[c.platform] || '🔌'}</span>
        <div style="flex:1;">
          <div style="font-weight:700; font-size:14px;">${c.label || c.platform}</div>
          <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-faint,#756b56); margin-top:1px;">${c.account_label || c.account_id || 'not connected'}</div>
        </div>
        <span style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.8px; text-transform:uppercase; padding:3px 8px; border-radius:14px; border:1px solid ${s.border}; background:${s.bg}; color:${s.color};">${s.glyph} ${s.label}</span>
      </div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-dim,#b3a98f); margin-bottom:10px;">${expiresLabel}</div>
      ${c.status === 'needs_auth' ? `
        <button onclick="authorizeConnector('${c.platform}')"
          style="width:100%; font-family:inherit; font-size:12px; font-weight:600; padding:8px; border-radius:8px; border:1px solid ${s.border}; background:${s.bg}; color:${s.color}; cursor:pointer;">
          Authorize ${c.label || c.platform}
        </button>` : ''}
      ${c.status === 'refreshable' ? `
        <button onclick="refreshConnector('${c.platform}')"
          style="width:100%; font-family:inherit; font-size:12px; font-weight:600; padding:8px; border-radius:8px; border:1px solid ${s.border}; background:${s.bg}; color:${s.color}; cursor:pointer;">
          ⟳ Refresh Token
        </button>` : ''}
    `;
    grid.appendChild(card);
  }
}

// ── Refresh a single connector token ─────────────────────────────────────────
async function refreshConnector(platform) {
  const t = ownerToken();
  if (!t) { alert('Sign in first.'); return; }
  try {
    const resp = await fetch(`${KING_NODE_URL}/connectors/${platform}/refresh`, {
      method: 'POST', headers: authHeaders()
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    loadConnectors();
  } catch (err) {
    alert(`Refresh failed: ${err.message}`);
  }
}

// ── Authorize a connector (OAuth redirect) ────────────────────────────────────
async function authorizeConnector(platform) {
  if (platform === 'wordpress') {
    const user = prompt('WordPress username:');
    if (!user) return;
    const pw = prompt('WordPress application password (from WP Admin → Users → Application Passwords):');
    if (!pw) return;
    const site = prompt('WordPress site URL (e.g. https://12sgi.com):', 'https://12sgi.com');
    try {
      const resp = await fetch(`${KING_NODE_URL}/connectors/wordpress/app-password`, {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({ username: user, app_password: pw, site_url: site })
      });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      loadConnectors();
    } catch (err) {
      alert(`Could not store WordPress credentials: ${err.message}`);
    }
    return;
  }

  // OAuth platforms — get the authorization URL from the owner node, then redirect.
  const redirectUri = `${KING_NODE_URL}/connectors/${platform}/callback-landing`;
  try {
    const resp = await fetch(`${KING_NODE_URL}/connectors/${platform}/authorize?redirect_uri=${encodeURIComponent(redirectUri)}&state=${platform}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.authorize_url) {
      window.location.href = data.authorize_url;
    } else {
      alert('No authorization URL returned — check platform credentials in .env.v2');
    }
  } catch (err) {
    alert(`Could not start authorization: ${err.message}`);
  }
}

// ── Load pending approvals ────────────────────────────────────────────────────
async function loadPending() {
  const note = document.getElementById('pending-note');
  const list = document.getElementById('pending-list');
  note.style.display = 'block';
  note.textContent = 'Loading pending items…';
  list.innerHTML = '';

  try {
    const resp = await fetch(`${KING_NODE_URL}/approvals/pending`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const items = data.pending || [];
    if (!items.length) {
      note.textContent = '✓ No pending approvals — all caught up.';
    } else {
      note.textContent = `${items.length} item${items.length !== 1 ? 's' : ''} awaiting approval.`;
      renderPendingList(items);
    }
  } catch (err) {
    note.textContent = `Could not load pending items: ${err.message}`;
  }
}

function renderPendingList(items) {
  const list = document.getElementById('pending-list');
  list.innerHTML = '';
  for (const item of items) {
    const jobId = item.job_id || '?';
    const lane = item.lane || '?';
    const action = item.action || 'unknown';
    const platforms = (item.payload && item.payload.platforms) || [];
    const laneColor = lane === 'output' ? '#e3ad33' : '#b3a98f';

    const card = document.createElement('div');
    card.style.cssText = 'background:var(--panel,#16140f); border:1px solid var(--line,#34301f); border-radius:12px; padding:14px 15px; margin-bottom:10px;';
    card.innerHTML = `
      <div style="display:flex; align-items:flex-start; gap:10px; margin-bottom:10px;">
        <div style="flex:1;">
          <div style="font-weight:600; font-size:13.5px;">${action}</div>
          <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-faint,#756b56); margin-top:2px;">
            <span style="color:${laneColor}; text-transform:uppercase; letter-spacing:1px;">${lane}</span>
            &nbsp;·&nbsp;${jobId.slice(0, 8)}…
          </div>
        </div>
        <div style="display:flex; gap:8px;">
          <button onclick="approveOne('${jobId}')"
            style="font-family:inherit; font-size:11px; font-weight:600; padding:6px 12px; border-radius:8px; border:1px solid #6abf86; background:rgba(106,191,134,0.13); color:#6abf86; cursor:pointer;">✓ Approve</button>
          <button onclick="rejectOne('${jobId}')"
            style="font-family:inherit; font-size:11px; font-weight:600; padding:6px 12px; border-radius:8px; border:1px solid #e5736b; background:rgba(229,115,107,0.12); color:#e5736b; cursor:pointer;">✕ Reject</button>
        </div>
      </div>
      ${platforms.length ? `
        <div style="display:flex; gap:6px; flex-wrap:wrap;">
          ${platforms.map(p => `<span style="font-family:'JetBrains Mono',monospace; font-size:10px; background:var(--panel2,#1f1c14); border:1px solid var(--line,#34301f); border-radius:10px; padding:2px 8px; color:var(--ink-dim,#b3a98f);">${PLATFORM_ICONS[p] || '🔌'} ${p}</span>`).join('')}
        </div>` : ''}
    `;
    list.appendChild(card);
  }
}

// ── Approve / reject single job ───────────────────────────────────────────────
async function approveOne(jobId) {
  const t = ownerToken();
  if (!t) { alert('Sign in first.'); return; }
  try {
    const resp = await fetch(`${KING_NODE_URL}/approvals/${jobId}/approve`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ approver: '' })   // owner node pulls approver from token
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    loadPending();
  } catch (err) {
    alert(`Approval failed: ${err.message}`);
  }
}

async function rejectOne(jobId) {
  const t = ownerToken();
  if (!t) { alert('Sign in first.'); return; }
  const reason = prompt('Reason for rejection:');
  if (!reason) return;
  try {
    const resp = await fetch(`${KING_NODE_URL}/approvals/${jobId}/reject`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ reason })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    loadPending();
  } catch (err) {
    alert(`Rejection failed: ${err.message}`);
  }
}

// ── Approve all pending ───────────────────────────────────────────────────────
async function approveAll() {
  const t = ownerToken();
  if (!t) { alert('Sign in first — owner token required to approve.'); return; }

  const btn = document.getElementById('approve-all-btn');
  btn.textContent = '…approving';
  btn.disabled = true;

  try {
    const resp = await fetch(`${KING_NODE_URL}/approvals/batch`, {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({})   // omit job_ids → approve all pending
    });
    if (!resp.ok) {
      if (resp.status === 401) {
        showBatchResult('error', '⚠ Session expired — please sign in again.');
        return;
      }
      throw new Error(`HTTP ${resp.status}`);
    }
    const data = await resp.json();
    const msg = `✓ Approved ${data.approved_count} item${data.approved_count !== 1 ? 's' : ''}` +
      (data.skipped_count ? ` · ${data.skipped_count} skipped` : '') +
      (data.approver ? ` · approver: ${data.approver}` : '');
    showBatchResult('ok', msg);
    loadPending();
  } catch (err) {
    showBatchResult('error', `Batch approval failed: ${err.message}`);
  } finally {
    btn.textContent = '✓ Approve All';
    btn.disabled = false;
  }
}

function showBatchResult(type, message) {
  const el = document.getElementById('batch-result');
  const isOk = type === 'ok';
  el.style.display = 'block';
  el.style.background = isOk ? 'rgba(106,191,134,0.12)' : 'rgba(229,115,107,0.12)';
  el.style.border = `1px solid ${isOk ? '#6abf86' : '#e5736b'}`;
  el.style.color = isOk ? '#6abf86' : '#e5736b';
  el.textContent = message;
  if (isOk) setTimeout(() => { el.style.display = 'none'; }, 5000);
}

// ── Auto-load on mount ────────────────────────────────────────────────────────
// Support.js / dc-import will call dcLoad if defined; fall back to DOMContentLoaded.
function dcLoad() {
  loadConnectors();
  loadPending();
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', dcLoad);
} else {
  dcLoad();
}
</script>
</x-dc>
<script src="../../govos-shell.js" defer></script>
</body>
</html>
