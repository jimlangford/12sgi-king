<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="../../govos.css">
</head>
<body>
<x-dc>
<helmet>
  <script src="./ds-base.js"></script>
</helmet>

<!-- Hub panel — System Witness. Owner-only surface.
     Reads /workboard/hub-feed from the king v2 server and displays the
     dispatch log as a categorised event feed: FINDING / SHIPPED / BLOCKER /
     DECISION / POLICY / HANDOFF / OWNERSHIP / INFO.
     Auto-refreshes every 30 s when the server is live. -->
<div data-surface="hub" data-screen-label="Hub · System Witness"
  style="min-height:100%; background:var(--app-backdrop,#0c0b09); color:var(--ink,#efe9da); font-family:'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif; font-size:14px;">

  <!-- Panel header -->
  <div style="display:flex; align-items:center; gap:10px; padding:14px clamp(14px,2.5vw,28px); border-bottom:1px solid var(--line,#34301f);">
    <span style="font-size:18px; color:var(--accent,#e3ad33);">◈</span>
    <div>
      <div style="font-weight:700; font-size:15px; letter-spacing:0.3px;">System Witness</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.6px; text-transform:uppercase; color:var(--ink-faint,#756b56);">Hub · dispatch log feed</div>
    </div>
    <span id="hub-live-badge" style="margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; background:rgba(255,255,255,.04); color:var(--ink-faint,#756b56); border:1px solid var(--line,#34301f); border-radius:20px; padding:3px 10px;">connecting…</span>
    <span style="font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--accent,#e3ad33); border:1px solid var(--accent,#e3ad33); border-radius:20px; padding:2px 8px; white-space:nowrap;">owner · private</span>
  </div>

  <div style="padding:18px clamp(14px,2.5vw,28px); max-width:900px;">

    <!-- Filter tabs -->
    <div id="hub-filter-bar" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px;">
      <button data-pfx="ALL"      onclick="hubSetFilter('ALL')"      style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border-radius:20px; border:1px solid var(--accent,#e3ad33); background:rgba(227,173,51,.14); color:var(--accent,#e3ad33); cursor:pointer;" class="hub-tab-active">All</button>
      <button data-pfx="BLOCKER"  onclick="hubSetFilter('BLOCKER')"  style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border-radius:20px; border:1px solid var(--line,#34301f); background:transparent; color:var(--ink-dim,#b3a98f); cursor:pointer;">Blocker</button>
      <button data-pfx="FINDING"  onclick="hubSetFilter('FINDING')"  style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border-radius:20px; border:1px solid var(--line,#34301f); background:transparent; color:var(--ink-dim,#b3a98f); cursor:pointer;">Finding</button>
      <button data-pfx="SHIPPED"  onclick="hubSetFilter('SHIPPED')"  style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border-radius:20px; border:1px solid var(--line,#34301f); background:transparent; color:var(--ink-dim,#b3a98f); cursor:pointer;">Shipped</button>
      <button data-pfx="DECISION" onclick="hubSetFilter('DECISION')" style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border-radius:20px; border:1px solid var(--line,#34301f); background:transparent; color:var(--ink-dim,#b3a98f); cursor:pointer;">Decision</button>
      <button data-pfx="INFO"     onclick="hubSetFilter('INFO')"     style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border-radius:20px; border:1px solid var(--line,#34301f); background:transparent; color:var(--ink-dim,#b3a98f); cursor:pointer;">Other</button>
    </div>

    <!-- Feed list -->
    <div id="hub-feed" style="display:flex; flex-direction:column; gap:6px;">
      <div style="color:var(--ink-faint,#756b56); font-size:13px; padding:32px 0; text-align:center;">Connecting to server…</div>
    </div>

    <!-- Footer -->
    <div style="margin-top:20px; padding-top:12px; border-top:1px solid var(--line,#34301f); display:flex; gap:14px; align-items:center; flex-wrap:wrap; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-faint,#756b56);">
      <span id="hub-footer-count">—</span>
      <button onclick="hubRefresh()" style="background:none; border:1px solid var(--line,#34301f); border-radius:7px; padding:4px 12px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent,#e3ad33); cursor:pointer;">↻ Refresh now</button>
      <span style="margin-left:auto;">Auto-refreshes every 30 s while server is live</span>
    </div>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
/* Hub panel — System Witness.
   Fetches /workboard/hub-feed from the live king v2 server.
   Renders dispatch log entries as a colour-coded event feed.
   Owner-only: reads king.ownerToken from localStorage for auth. */

const PREFIX_COLORS = {
  BLOCKER:   { bg: 'rgba(192,57,43,.18)', border: '#c0392b', text: '#e05c4e' },
  FINDING:   { bg: 'rgba(227,173,51,.12)', border: '#a07520', text: '#e3ad33' },
  SHIPPED:   { bg: 'rgba(106,191,134,.12)', border: '#3a7a50', text: '#6abf86' },
  DECISION:  { bg: 'rgba(100,149,237,.12)', border: '#4a6fa5', text: '#7baae0' },
  POLICY:    { bg: 'rgba(100,149,237,.08)', border: '#34301f',  text: '#7baae0' },
  HANDOFF:   { bg: 'rgba(180,130,220,.10)', border: '#5a3a7a', text: '#b48adc' },
  OWNERSHIP: { bg: 'rgba(180,130,220,.08)', border: '#34301f',  text: '#b48adc' },
  DONE:      { bg: 'rgba(106,191,134,.07)', border: '#34301f',  text: '#6abf86' },
  INFO:      { bg: 'rgba(255,255,255,.03)', border: '#34301f',  text: '#b3a98f' },
};

function _esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function _token() {
  try { return localStorage.getItem('king.ownerToken'); } catch(e) { return null; }
}

function _stripPrefix(event, prefix) {
  if (prefix === 'INFO') return event;
  const re = new RegExp('^' + prefix + '[:\\s]*', 'i');
  return event.replace(re, '').trim();
}

function _laneTag(lane) {
  if (!lane) return '';
  return `<span style="margin-left:6px; font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.5px; text-transform:uppercase; color:var(--ink-faint,#756b56); border:1px solid var(--line,#34301f); border-radius:10px; padding:1px 6px;">${_esc(lane)}</span>`;
}

let _allEntries = [];
let _currentFilter = 'ALL';

function hubSetFilter(pfx) {
  _currentFilter = pfx;
  document.querySelectorAll('#hub-filter-bar button').forEach(b => {
    const active = b.getAttribute('data-pfx') === pfx;
    b.style.background    = active ? 'rgba(227,173,51,.14)' : 'transparent';
    b.style.color         = active ? 'var(--accent,#e3ad33)' : 'var(--ink-dim,#b3a98f)';
    b.style.borderColor   = active ? 'var(--accent,#e3ad33)' : 'var(--line,#34301f)';
  });
  _renderFeed(_allEntries, pfx);
}

function _renderFeed(entries, filter) {
  const el = document.getElementById('hub-feed');
  if (!el) return;

  const visible = filter === 'ALL' ? entries : entries.filter(e => {
    if (filter === 'INFO') {
      return !['BLOCKER','FINDING','SHIPPED','DECISION','POLICY','HANDOFF','OWNERSHIP','DONE'].includes(e.prefix);
    }
    return e.prefix === filter;
  });

  if (!visible.length) {
    el.innerHTML = '<div style="color:var(--ink-faint,#756b56); font-size:13px; padding:32px 0; text-align:center;">No entries for this filter.</div>';
    return;
  }

  el.innerHTML = visible.map(e => {
    const c = PREFIX_COLORS[e.prefix] || PREFIX_COLORS.INFO;
    const body = _stripPrefix(e.event, e.prefix);
    return `<div style="background:${c.bg}; border:1px solid ${c.border}; border-radius:9px; padding:10px 13px; display:flex; gap:10px; align-items:flex-start;">
      <span style="font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; color:${c.text}; border:1px solid ${c.border}; border-radius:10px; padding:2px 7px; white-space:nowrap; margin-top:1px; flex-shrink:0;">${_esc(e.prefix)}</span>
      <div style="flex:1; min-width:0;">
        <div style="font-size:13px; color:var(--ink,#efe9da); line-height:1.45; word-break:break-word;">${_esc(body)}</div>
        <div style="margin-top:4px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-faint,#756b56);">${_esc(e.iso || '')} · ${_esc(e.source || '')}${_laneTag(e.lane)}</div>
      </div>
    </div>`;
  }).join('');
}

class Component extends DCLogic {
  state = { liveBase: null };

  componentDidMount() {
    window.hubRefresh = () => this._fetch();
    window.hubSetFilter = (pfx) => { hubSetFilter(pfx); };
    if (window.KingLive) {
      this._unLive = window.KingLive.subscribe(s => {
        if (s.status === 'live' && s.base) {
          this.setState({ liveBase: s.base });
          this._fetch(s.base);
          const badge = document.getElementById('hub-live-badge');
          if (badge) { badge.textContent = s.baseLabel || 'live'; badge.style.color = '#6abf86'; badge.style.borderColor = '#3a7a50'; }
        } else if (s.status !== 'connecting') {
          const badge = document.getElementById('hub-live-badge');
          if (badge) { badge.textContent = 'server offline'; badge.style.color = '#756b56'; badge.style.borderColor = '#34301f'; }
          const el = document.getElementById('hub-feed');
          if (el) el.innerHTML = '<div style="color:var(--ink-faint,#756b56); font-size:13px; padding:32px 0; text-align:center;">Server offline — hub feed requires the live owner node.</div>';
        }
      });
    } else {
      const el = document.getElementById('hub-feed');
      if (el) el.innerHTML = '<div style="color:var(--ink-faint,#756b56); font-size:13px; padding:32px 0; text-align:center;">KingLive not available — open from the owner machine.</div>';
    }
  }

  componentWillUnmount() {
    if (this._unLive) this._unLive();
    if (this._timer) clearTimeout(this._timer);
    window.hubRefresh = null;
    window.hubSetFilter = null;
  }

  _fetch(base) {
    const b = base || this.state.liveBase;
    if (!b) return;
    const token = _token();
    const headers = token ? { 'Authorization': 'Bearer ' + token } : {};
    fetch(b + '/workboard/hub-feed?limit=60', { headers, cache: 'no-store' })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        _allEntries = data.entries || [];
        _renderFeed(_allEntries, _currentFilter);
        const cnt = document.getElementById('hub-footer-count');
        if (cnt) cnt.textContent = `${_allEntries.length} entries`;
        if (this._timer) clearTimeout(this._timer);
        this._timer = setTimeout(() => this._fetch(), 30000);
      })
      .catch(err => {
        console.warn('hub-feed fetch failed:', err);
        const el = document.getElementById('hub-feed');
        if (el && !_allEntries.length) {
          el.innerHTML = '<div style="color:var(--ink-faint,#756b56); font-size:13px; padding:32px 0; text-align:center;">Feed unavailable — check server.</div>';
        }
      });
  }

  renderVals() {
    return {};
  }
}
</script>
<script src="../../govos-shell.js" defer></script>
</body>
</html>
