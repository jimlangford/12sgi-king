<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><style id="mobile-heal">img,video,svg{max-width:100%;height:auto}table,pre{max-width:100%}@media(max-width:680px){html{overflow-x:hidden}table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}td,th{word-break:break-word;overflow-wrap:anywhere}pre{white-space:pre-wrap}}</style>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="../govos.css">
</head>
<body>
<x-dc>
<helmet>
  <script src="./ds-base.js"></script>
</helmet>

<!-- Events panel — owner-gated, connects to the existing /events route on the v2 owner node.
     Shows the platform event feed (auth, case, workboard transitions) with live refresh.
     Dead-letter events are shown in a separate section at the bottom. -->
<div data-surface="events" data-screen-label="Platform Events"
  style="min-height:100%; background:var(--app-backdrop,#081420); color:var(--ink,#eaf2fc);
    font-family:'Segoe UI Variable Text','Segoe UI',system-ui,sans-serif; font-size:14px;">

  <!-- Header -->
  <div style="display:flex; align-items:center; gap:10px; padding:14px clamp(14px,2.5vw,28px); border-bottom:1px solid var(--line,#1f3d5f);">
    <span style="font-size:18px; color:var(--accent,#e3ad33);">◈</span>
    <div>
      <div style="font-weight:700; font-size:15px; letter-spacing:0.3px;">12sgi · Naga</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.6px; text-transform:uppercase; color:var(--ink-faint,#6d89ab);">Platform Events</div>
    </div>
    <span style="margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; background:rgba(227,173,51,0.14); color:var(--accent,#e3ad33); border:1px solid var(--accent,#e3ad33); border-radius:20px; padding:3px 10px;">owner · private</span>
  </div>

  <div style="max-width:900px; padding:0 clamp(14px,2.5vw,28px) 60px; margin:0 auto;">

    <!-- Summary bar -->
    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin:18px 0;">
      <div style="background:var(--panel,#0f2540); border:1px solid var(--line,#1f3d5f); border-radius:10px; padding:12px 14px;">
        <div style="font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--ok,#4bbf7b);" id="ev-count">—</div>
        <div style="font-size:11px; color:var(--ink-faint,#6d89ab); margin-top:2px;">Recent events</div>
      </div>
      <div style="background:var(--panel,#0f2540); border:1px solid var(--line,#1f3d5f); border-radius:10px; padding:12px 14px;">
        <div style="font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--warn,#e3ad33);" id="ev-dl-count">—</div>
        <div style="font-size:11px; color:var(--ink-faint,#6d89ab); margin-top:2px;">Dead letters</div>
      </div>
      <div style="background:var(--panel,#0f2540); border:1px solid var(--line,#1f3d5f); border-radius:10px; padding:12px 14px; cursor:pointer;" onclick="eventsRefresh()">
        <div style="font-family:'JetBrains Mono',monospace; font-size:22px; font-weight:700; color:var(--ink-dim,#a7c0dd);">↺</div>
        <div style="font-size:11px; color:var(--ink-faint,#6d89ab); margin-top:2px;">Refresh</div>
      </div>
    </div>

    <!-- Filter bar -->
    <div style="display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;">
      <input id="ev-filter" placeholder="Filter by event type or producer…"
        style="flex:1; min-width:200px; background:var(--panel,#0f2540); border:1px solid var(--line,#1f3d5f); border-radius:6px; padding:7px 12px; color:var(--ink,#eaf2fc); font-size:13px; font-family:'JetBrains Mono',monospace;"
        oninput="eventsApplyFilter()" />
    </div>

    <!-- Event feed -->
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--ink-faint,#6d89ab); border-bottom:1px solid var(--line,#1f3d5f); padding:18px 0 6px; margin-bottom:10px;">Event Feed</div>
    <div id="ev-feed" style="font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.7;">
      <div style="color:var(--ink-faint,#6d89ab); padding:24px 0; text-align:center;">Loading…</div>
    </div>

    <!-- Dead-letter section -->
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:var(--ink-faint,#6d89ab); border-bottom:1px solid var(--line,#1f3d5f); padding:28px 0 6px; margin-bottom:10px;">Dead Letters</div>
    <div id="ev-dead" style="font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.7;">
      <div style="color:var(--ink-faint,#6d89ab); padding:12px 0; text-align:center;">Loading…</div>
    </div>

    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--ink-faint,#6d89ab); text-align:center; padding-top:32px;">
      12 Stones Global · Platform Events · private — owner unlocked · aloha · pono
    </div>
  </div>

</div>

<script>
(function() {
  var _allEvents = [];
  var _liveBase = null;

  function _token() {
    try { return localStorage.getItem('king.ownerToken'); } catch(e) { return null; }
  }

  function _headers() {
    var t = _token();
    return t ? { 'Authorization': 'Bearer ' + t } : {};
  }

  function _el(id) { return document.getElementById(id); }

  function _esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  var EVENT_TYPE_COLORS = {
    'auth.session.created': '#4bbf7b',
    'auth.oauth.failed':    '#e05252',
    'case.created':         '#6ab4e3',
    'workboard.job.created': '#e3ad33',
    'workboard.job.approved': '#4bbf7b',
    'workboard.job.rejected': '#e05252',
    'workboard.engineering.selfhealed': '#a7c0dd',
  };

  function _typeColor(type) {
    return EVENT_TYPE_COLORS[type] || '#a7c0dd';
  }

  function _renderEvents(events) {
    var feed = _el('ev-feed');
    if (!feed) return;
    if (!events || !events.length) {
      feed.innerHTML = '<div style="color:var(--ink-faint,#6d89ab); padding:24px 0; text-align:center;">No events yet.</div>';
      return;
    }
    feed.innerHTML = events.map(function(ev) {
      var color = _typeColor(ev.event_type || '');
      var payload = '';
      try {
        var p = JSON.parse(ev.payload_json || '{}');
        var keys = Object.keys(p);
        if (keys.length) {
          payload = keys.slice(0,6).map(function(k) {
            return '<span style="color:var(--ink-dim,#a7c0dd)">' + _esc(k) + '</span>=<span style="color:var(--ink,#eaf2fc)">' + _esc(String(p[k]).slice(0,60)) + '</span>';
          }).join('  ');
        }
      } catch(e) {}
      return '<div style="border-bottom:1px solid var(--line,#1f3d5f); padding:7px 0;">' +
        '<span style="color:' + color + '; font-weight:700;">' + _esc(ev.event_type) + '</span>' +
        '  <span style="color:var(--ink-faint,#6d89ab);">' + _esc(ev.producer) + '</span>' +
        (ev.entity_id ? '  <span style="color:var(--ink-dim,#a7c0dd);">' + _esc(ev.entity_id.slice(0,16)) + '</span>' : '') +
        '  <span style="color:var(--ink-faint,#6d89ab); float:right;">' + _esc((ev.ts||'').slice(0,19).replace('T',' ')) + '</span>' +
        (payload ? '<div style="font-size:11px; padding-top:2px; padding-left:12px;">' + payload + '</div>' : '') +
        '</div>';
    }).join('');
  }

  function _renderDeadLetters(dls) {
    var el = _el('ev-dead');
    if (!el) return;
    if (!dls || !dls.length) {
      el.innerHTML = '<div style="color:var(--ink-faint,#6d89ab); padding:10px 0; text-align:center;">None.</div>';
      return;
    }
    el.innerHTML = dls.map(function(dl) {
      return '<div style="border-bottom:1px solid var(--line,#1f3d5f); padding:7px 0; color:var(--warn,#e3ad33);">' +
        '<span style="font-weight:700;">' + _esc(dl.event_type) + '</span>' +
        '  <span style="color:var(--ink-faint,#6d89ab);">' + _esc(dl.producer) + '</span>' +
        '  <span style="color:var(--ink-dim,#a7c0dd);">' + _esc(dl.reason) + '</span>' +
        '  <span style="color:var(--ink-faint,#6d89ab); float:right;">' + _esc((dl.ts||'').slice(0,19).replace('T',' ')) + '</span>' +
        '</div>';
    }).join('');
  }

  function _fetch(base) {
    var b = base || _liveBase;
    if (!b) {
      var feed = _el('ev-feed');
      if (feed) feed.innerHTML = '<div style="color:var(--ink-faint,#6d89ab); padding:24px 0; text-align:center;">Not connected — open from the owner machine.</div>';
      return;
    }
    var h = _headers();

    // Fetch events
    fetch(b + '/events?limit=100', { headers: h, cache: 'no-store' })
      .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function(data) {
        _allEvents = data.events || [];
        var cnt = _el('ev-count');
        if (cnt) cnt.textContent = _allEvents.length;
        eventsApplyFilter();
      })
      .catch(function(e) {
        var feed = _el('ev-feed');
        if (feed) feed.innerHTML = '<div style="color:#e05252; padding:24px 0; text-align:center;">Could not load events (' + e + ').</div>';
      });

    // Fetch dead letters
    fetch(b + '/events/dead-letters?limit=20', { headers: h, cache: 'no-store' })
      .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function(data) {
        var dls = data.dead_letters || [];
        var cnt = _el('ev-dl-count');
        if (cnt) cnt.textContent = dls.length;
        _renderDeadLetters(dls);
      })
      .catch(function() {});
  }

  window.eventsRefresh = function() { _fetch(); };

  window.eventsApplyFilter = function() {
    var q = (_el('ev-filter') || {}).value || '';
    var filtered = q
      ? _allEvents.filter(function(ev) {
          return (ev.event_type || '').indexOf(q) >= 0 || (ev.producer || '').indexOf(q) >= 0;
        })
      : _allEvents;
    _renderEvents(filtered);
  };

  // Subscribe to KingLive for the owner node base URL
  if (window.KingLive) {
    window.KingLive.subscribe(function(s) {
      if (s && s.base) {
        _liveBase = s.base;
        _fetch(s.base);
      }
    });
  } else {
    var feed = _el('ev-feed');
    if (feed) feed.innerHTML = '<div style="color:var(--ink-faint,#6d89ab); padding:24px 0; text-align:center;">KingLive not available — open from the owner machine.</div>';
  }

  // Auto-refresh every 30s
  setInterval(function() { _fetch(); }, 30000);
})();
</script>

</x-dc>
<script src="../govos-shell.js" defer></script>
</body>
</html>
