<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>govOS · Admin Console</title>
    <!--
      Tier 1.6 — Admin App UI (audit-quad-os, 2026-07-15).
      Replaces the demo stub with a real owner-facing console:
        · Service Health  — live grid from the health gateway (GET :8106/api/v1/health)
        · Owner Allowlist — read-only view of who may authenticate as Owner
                            (GET :8101/api/v2/auth/owner/allowlist, owner-gated)
        · Auth Activity   — honest current state of audit events
      Self-contained (no external CSS/JS/CDN); house design language, light/dark aware.
    -->
    <style>
      :root {
        --gold: #e3ad33; --gold-dim: #b8862099;
        --bg-deep: #15100b; --bg-panel: #1e1811; --bg-raise: #271f16; --line: #3a2f22;
        --ink: #f3ead9; --ink-dim: #b6a68a; --ink-mute: #8b7d68;
        --ok: #6fbf73; --warn: #e0a244; --bad: #d9704f; --info: #6ea8d8;
        --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
        --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --radius: 10px; --shadow: 0 8px 30px rgba(0,0,0,.35);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg-deep: #f6f1e7; --bg-panel: #fffdf8; --bg-raise: #fbf5e9; --line: #e4d8c3;
          --ink: #2b2318; --ink-dim: #5c5140; --ink-mute: #8a7d66; --shadow: 0 8px 24px rgba(90,70,20,.12);
        }
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: var(--sans); background: var(--bg-deep); color: var(--ink); line-height: 1.5; -webkit-font-smoothing: antialiased; }
      code { font-family: var(--mono); font-size: .92em; background: var(--bg-raise); padding: 1px 5px; border-radius: 5px; }
      .topbar { display: flex; align-items: center; gap: 14px; padding: 14px 22px; background: linear-gradient(180deg, var(--bg-panel), var(--bg-deep)); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 5; }
      .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: .3px; }
      .brand .lotus { color: var(--gold); font-size: 20px; }
      .brand small { font-weight: 500; color: var(--ink-mute); font-size: 12px; }
      .spacer { flex: 1; }
      .whoami { font-family: var(--mono); font-size: 12px; color: var(--ink-dim); text-align: right; }
      .whoami b { color: var(--gold); }
      main { max-width: 1040px; margin: 0 auto; padding: 22px; }
      .auth { background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 18px; }
      .auth h2 { margin: 0 0 4px; font-size: 14px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--ink-mute); }
      .auth .hint { font-size: 12.5px; color: var(--ink-mute); margin: 0 0 12px; }
      .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
      .field { display: flex; flex-direction: column; gap: 4px; }
      .field label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--ink-mute); }
      input, select { font-family: var(--sans); font-size: 14px; background: var(--bg-raise); color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; min-width: 150px; }
      input:focus, select:focus { outline: 2px solid var(--gold-dim); border-color: var(--gold); }
      button { font-family: var(--sans); font-size: 14px; font-weight: 600; border-radius: 8px; padding: 9px 16px; cursor: pointer; border: 1px solid var(--line); background: var(--bg-raise); color: var(--ink); transition: transform .05s ease, border-color .15s ease; }
      button:hover { border-color: var(--gold); }
      button:active { transform: translateY(1px); }
      button.primary { background: var(--gold); color: #1a1206; border-color: var(--gold); }
      button.ghost { background: transparent; }
      button.link { background: none; border: none; color: var(--gold); padding: 4px 6px; }
      button.tab { background: transparent; border-color: transparent; color: var(--ink-dim); }
      button.tab.active { background: var(--bg-panel); border-color: var(--line); color: var(--gold); }
      .collapsed { display: none; }
      .tabs { display: flex; gap: 6px; margin-bottom: 16px; align-items: center; }
      .panel { background: var(--bg-panel); border: 1px solid var(--line); border-radius: var(--radius); }
      .p20 { padding: 20px; }
      .state { padding: 40px 16px; text-align: center; color: var(--ink-mute); }
      .state.err { color: var(--bad); }
      .hgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
      .hcard { border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; background: var(--bg-raise); display: flex; align-items: center; gap: 10px; }
      .dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }
      .dot.ok { background: var(--ok); box-shadow: 0 0 0 3px #6fbf7322; }
      .dot.bad { background: var(--bad); box-shadow: 0 0 0 3px #d9704f22; }
      .dot.na { background: var(--ink-mute); }
      .hcard .n { font-weight: 600; }
      .hcard .m { font-size: 11.5px; color: var(--ink-mute); }
      .status-line { display: flex; align-items: center; gap: 10px; margin: 0 0 16px; }
      .pill { display: inline-block; font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 999px; text-transform: uppercase; letter-spacing: .5px; }
      .pill.ok { color: var(--ok); border: 1px solid #2f5a33; background: #6fbf7318; }
      .pill.degraded { color: var(--warn); border: 1px solid #5a4a2f; background: #e0a24418; }
      .pill.down { color: var(--bad); border: 1px solid #5a2f2f; background: #d9704f18; }
      .al-group { margin-bottom: 18px; }
      .al-group h4 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; letter-spacing: .7px; color: var(--ink-mute); }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .chip { font-family: var(--mono); font-size: 12.5px; padding: 4px 11px; border-radius: 999px; border: 1px solid var(--line); background: var(--bg-raise); }
      .note { border-left: 3px solid var(--gold); background: var(--bg-raise); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: var(--ink-dim); margin-top: 14px; }
      .note b { color: var(--ink); }
      #toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(30px); background: var(--bg-raise); border: 1px solid var(--line); border-left: 4px solid var(--gold); color: var(--ink); padding: 12px 18px; border-radius: 10px; box-shadow: var(--shadow); font-size: 14px; opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 30; max-width: 90vw; }
      #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      #toast.bad { border-left-color: var(--bad); }
      #toast.ok { border-left-color: var(--ok); }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><span class="lotus">✦</span> govOS <small>Admin Console</small></div>
      <div class="spacer"></div>
      <div class="whoami" id="whoami">Not signed in</div>
      <button class="ghost" id="signout" style="display:none">Sign out</button>
    </header>

    <main>
      <section class="auth" id="auth">
        <h2>Owner session</h2>
        <p class="hint">
          The allowlist view requires an <b>Owner</b> session. Sign in via the console redirect
          (<code>#token=…</code>), paste a token, or mint a local dev Owner session. Service health is
          public and needs no token.
        </p>
        <div class="row">
          <div class="field"><label for="subject">Subject</label><input id="subject" value="owner-admin" /></div>
          <div class="field"><label for="role">Role</label>
            <select id="role"><option selected>Owner</option><option>Municipality</option><option>Partner</option><option>Resident</option></select>
          </div>
          <button class="primary" id="createSession">Dev sign-in</button>
          <button class="link" id="toggleManual" type="button">Paste a token…</button>
        </div>
        <div class="row collapsed" id="manualrow" style="margin-top:12px">
          <div class="field" style="flex:1"><label for="manualToken">Bearer token (JWT)</label><input id="manualToken" placeholder="eyJhbGciOi…" style="width:100%" /></div>
          <button id="useManual">Use token</button>
        </div>
      </section>

      <nav class="tabs" id="tabs">
        <button class="tab active" data-tab="health">Service health</button>
        <button class="tab" data-tab="allowlist">Owner allowlist</button>
        <button class="tab" data-tab="activity">Auth activity</button>
        <div class="spacer"></div>
        <button id="refreshBtn">↻ Refresh</button>
      </nav>

      <section id="view"></section>
    </main>

    <div id="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
