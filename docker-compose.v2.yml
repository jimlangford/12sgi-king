# govOS v2 backend — local/king-server container stack.
#
# Runs the 5 FastAPI services (auth/tenant/documents/storage/ai) plus the health aggregator as
# containers on this machine (king-server, Tailscale host 12sgianonymous.tail760750.ts.net).
# This replaces ad-hoc `uvicorn ... --app-dir` processes from docs/GOVOS_V2_LOCAL_DEV.md with
# supervised, restart-on-failure containers.
#
# AuraDB Free cloud mirror (added 2026-07-13):
#   Set NEO4J_AURA_URI / NEO4J_AURA_USER / NEO4J_AURA_PASSWORD in .env.v2 (gitignored).
#   All services read from local Neo4j first; AuraDB is used as read-fallback when local is
#   offline and as the nightly write-mirror via watchers/aura_sync.py.
#   AuraDB Free limit: 200k nodes / 400k rels / 512MB — your data is ~6.5k/18k, fits comfortably.
#   Get free credentials: https://neo4j.com/cloud/aura-free/ (no credit card)
#
# Neo4j memory (2026-07-13 fix):
#   Reduced defaults from 512M/512M to 256M/256M to prevent OOM kills (exit code 137)
#   on the king-server host which is disk/RAM constrained. Override via .env.v2.
#   Full 512M/512M works fine once disk is cleaned: docker image prune -a --filter "until=72h"
#
# Usage:
#   docker compose -f docker-compose.v2.yml up -d --build
#   docker compose -f docker-compose.v2.yml ps
#   docker compose -f docker-compose.v2.yml logs -f auth
#   docker compose -f docker-compose.v2.yml down
#
# Secrets note: AUTH_SIGNING_SECRET / INTERNAL_SERVICE_TOKEN below use dev defaults matching
# docs/GOVOS_V2_LOCAL_DEV.md. Override with a local `.env.v2` (gitignored) before exposing this
# past Tailscale-private use. GOVOS_ALLOW_DEV_SECRETS=1 is the explicit opt-in that lets the auth
# service boot on those dev defaults at all.

x-common-env: &common-env
  GOVOS_ALLOW_DEV_SECRETS: ${GOVOS_ALLOW_DEV_SECRETS:-1}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
  AUTH_INTROSPECTION_URL: http://auth:8101/api/v2/auth/introspect
  AUTH_READY_URL: http://auth:8101/api/v2/ready
  TENANT_SERVICE_URL: http://tenant:8102
  TENANT_READY_URL: http://tenant:8102/api/v2/ready
  DEPENDENCY_TIMEOUT_SECONDS: ${DEPENDENCY_TIMEOUT_SECONDS:-3}
  PLATFORM_VERSION: ${PLATFORM_VERSION:-unknown}
  BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
  BUILD_TIME: ${BUILD_TIME:-unknown}
  COMMIT_SHA: ${COMMIT_SHA:-unknown}
  BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
  ENVIRONMENT: ${ENVIRONMENT:-local}
  WORKBOARD_DISPATCH_LOG: /data/dispatch/govos_v2_dispatch.jsonl
  WORKBOARD_TARGET_THREAD: ${WORKBOARD_TARGET_THREAD:-workboard-quad-os}
  # Local Neo4j (primary — fast, zero cloud tokens)
  NEO4J_HTTP: ${NEO4J_HTTP:-http://neo4j:7474/db/neo4j/tx/commit}
  GRAPH_REFRESH_STATE_PATH: /data/dispatch/graph_refresh_state.json
  GRAPH_STACK_VERSION: ${GRAPH_STACK_VERSION:-5.2}
  # AuraDB Free (cloud mirror — fallback when local Neo4j is offline)
  # Set these in .env.v2 (gitignored) after creating a free instance at
  # https://neo4j.com/cloud/aura-free/ — no credit card required.
  # Leave empty to disable Aura fallback (graceful degradation).
  NEO4J_AURA_URI: ${NEO4J_AURA_URI:-}
  NEO4J_AURA_USER: ${NEO4J_AURA_USER:-neo4j}
  NEO4J_AURA_PASSWORD: ${NEO4J_AURA_PASSWORD:-}
  NEO4J_AURA_ENABLED: ${NEO4J_AURA_ENABLED:-false}

services:
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: none
      NEO4J_server_default__listen__address: 0.0.0.0
      # Reduced from 512M to 256M to prevent OOM kills on constrained hosts.
      # Override to 512M in .env.v2 once disk is freed (docker image prune -a).
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-256M}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_SIZE:-256M}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_SIZE:-256M}
      NEO4J_server_config_strict__validation_enabled: "false"
    volumes:
      - v2-neo4j-data:/data
      - v2-neo4j-logs:/logs
    ports: ["127.0.0.1:7474:7474", "127.0.0.1:7687:7687"]
    restart: unless-stopped
    # Hard memory limit matches heap + pagecache + ~128MB JVM overhead
    mem_limit: ${NEO4J_MEM_LIMIT:-640m}
    mem_reservation: ${NEO4J_MEM_RESERVATION:-256m}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  auth:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.auth.app.main:app", "--host", "0.0.0.0", "--port", "8101"]
    environment:
      <<: *common-env
      AUTH_SIGNING_SECRET: ${AUTH_SIGNING_SECRET:-dev-only-signing-secret-change-me}
      AUTH_DB_PATH: /data/db/govos_v2_auth.db
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@12sgi.com}
      AUTH_PUBLIC_URL: ${AUTH_PUBLIC_URL:-https://auth.12sgi.com}
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-https://12sgi.com/king/}
      OWNER_GITHUB_LOGINS: ${OWNER_GITHUB_LOGINS:-jimlangford}
      OWNER_GOOGLE_EMAILS: ${OWNER_GOOGLE_EMAILS:-jimlangford@me.com,elementlotus@gmail.com,jimmylangford@elementlotus.com,JRCSL@12sgi.com}
      OWNER_APPLE_EMAILS: ${OWNER_APPLE_EMAILS:-jimlangford@me.com,elementlotus@gmail.com,jimmylangford@elementlotus.com,JRCSL@12sgi.com}
      OWNER_MAGIC_EMAILS: ${OWNER_MAGIC_EMAILS:-jimlangford@me.com,elementlotus@gmail.com,jimmylangford@elementlotus.com,jrcsl@12sgi.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://jimlangford.github.io,https://12sgi.com}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-12sgi.com}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-https://12sgi.com}
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8101:8101"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8101/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  tenant:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.tenant.app.main:app", "--host", "0.0.0.0", "--port", "8102"]
    environment:
      <<: *common-env
      TENANT_DB_PATH: /data/db/govos_v2_tenant.db
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8102:8102"]
    depends_on: [auth]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8102/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  documents:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.documents.app.main:app", "--host", "0.0.0.0", "--port", "8103"]
    environment:
      <<: *common-env
      DOCUMENTS_DB_PATH: /data/db/govos_v2_documents.db
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8103:8103"]
    depends_on: [auth, tenant]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8103/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  storage:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.storage.app.main:app", "--host", "0.0.0.0", "--port", "8104"]
    environment:
      <<: *common-env
      STORAGE_DB_PATH: /data/db/govos_v2_storage.db
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8104:8104"]
    depends_on: [auth]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8104/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.ai.app.main:app", "--host", "0.0.0.0", "--port", "8105"]
    environment:
      <<: *common-env
      AI_DB_PATH: /data/db/govos_v2_ai.db
      GPU_ROUTER_URL: http://gpu-router:8107
      GPU_ROUTER_READY_URL: http://gpu-router:8107/api/v2/ready
      GPU_DEFAULT_MODEL: ${GPU_DEFAULT_MODEL:-llama3}
      GPU_INFER_TIMEOUT: ${GPU_INFER_TIMEOUT:-120}
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8105:8105"]
    depends_on: [auth, tenant, gpu-router]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8105/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  health:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.health.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      PLATFORM_VERSION: ${PLATFORM_VERSION:-unknown}
      BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      COMMIT_SHA: ${COMMIT_SHA:-unknown}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      SURFACES_LIST: "auth=auth:8101,tenant=tenant:8102,documents=documents:8103,storage=storage:8104,ai=ai:8105,gpu-router=gpu-router:8107,king-bridge=king-bridge:8109"
      SURFACES_HEALTH_PATH: /api/v2/ready
    ports: ["127.0.0.1:8106:8000"]
    depends_on: [auth, tenant, documents, storage, ai, gpu-router, king-bridge]
    restart: unless-stopped

  gpu-runtime:
    image: ollama/ollama:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - v2-ollama:/root/.ollama
    # NO host port publish — host Ollama already owns :11434.
    # gpu-router reaches this over the internal Docker network only.
    expose: ["11434"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  gpu-router:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.gpu_router.app.main:app", "--host", "0.0.0.0", "--port", "8107"]
    environment:
      <<: *common-env
      GPU_ROUTER_DB_PATH: /data/db/govos_v2_gpu_router.db
      GPU_RUNTIME_URL: http://gpu-runtime:11434
      GPU_CLIENT_PRIORITIES: ${GPU_CLIENT_PRIORITIES:-govos-core:1,maui-tenant:2,studio:3,civic-signal:4,workboard:5,reports:6}
      GPU_INFER_TIMEOUT: ${GPU_INFER_TIMEOUT:-120}
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8107:8107"]
    depends_on: [auth, gpu-runtime]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8107/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  king-bridge:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.king_bridge.app.main:app", "--host", "0.0.0.0", "--port", "8109"]
    environment:
      <<: *common-env
      KING_BRIDGE_DB: /data/db/king_bridge.db
      OLLAMA_BASE: ${OLLAMA_BASE:-http://host.docker.internal:11434}
      NEO4J_HTTP: ${NEO4J_HTTP:-http://neo4j:7474/db/neo4j/tx/commit}
      NEO4J_AURA_URI: ${NEO4J_AURA_URI:-}
      NEO4J_AURA_USER: ${NEO4J_AURA_USER:-neo4j}
      NEO4J_AURA_PASSWORD: ${NEO4J_AURA_PASSWORD:-}
      KING_BRIDGE_INFER_TIMEOUT: ${KING_BRIDGE_INFER_TIMEOUT:-120}
      KING_BRIDGE_POLL_MAX: ${KING_BRIDGE_POLL_MAX:-10}
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8109:8109"]
    depends_on: [neo4j]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8109/api/v2/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  v2-db:
  v2-dispatch:
  v2-ollama:
  v2-neo4j-data:
  v2-neo4j-logs:
