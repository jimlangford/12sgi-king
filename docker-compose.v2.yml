      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      WORKBOARD_DISPATCH_LOG: /data/dispatch/govos_v2_dispatch.jsonl
      WORKBOARD_TARGET_THREAD: ${WORKBOARD_TARGET_THREAD:-workboard-quad-os}
      NEO4J_HTTP: ${NEO4J_HTTP:-http://neo4j:7474/db/neo4j/tx/commit}
      GRAPH_REFRESH_STATE_PATH: /data/dispatch/graph_refresh_state.json
      GRAPH_STACK_VERSION: ${GRAPH_STACK_VERSION:-5.2}
      NEO4J_AURA_URI: ${NEO4J_AURA_URI:-}
      NEO4J_AURA_USER: ${NEO4J_AURA_USER:-neo4j}
      NEO4J_AURA_PASSWORD: ${NEO4J_AURA_PASSWORD:-}
      NEO4J_AURA_ENABLED: ${NEO4J_AURA_ENABLED:-false}
      KING_BRIDGE_DB: /data/db/king_bridge.db
      OLLAMA_BASE: ${OLLAMA_BASE:-http://host.docker.internal:11434}
      KING_BRIDGE_INFER_TIMEOUT: ${KING_BRIDGE_INFER_TIMEOUT:-120}
      KING_BRIDGE_POLL_MAX: ${KING_BRIDGE_POLL_MAX:-10}
    volumes:
    - v2-db:/data/db
    - v2-dispatch:/data/dispatch
    ports:
    - 127.0.0.1:8109:8109
    depends_on:
    - neo4j
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request as u; u.urlopen('http://localhost:8109/api/v2/ready',
        timeout=5)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
  connector-runner:
    build:
      context: .
      dockerfile: services/Dockerfile
    command:
    - python
    - services/connectors/runner.py
    environment:
      CONNECTOR_REFRESH_INTERVAL: ${CONNECTOR_REFRESH_INTERVAL:-3600}
      CONNECTOR_TOKEN_DB: /data/db/connector_tokens.db
      WORKBOARD_ENABLED: '1'
    volumes:
    - v2-db:/data/db
    - v2-dispatch:/data/dispatch
    depends_on:
    - auth
    - king-bridge
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: '2'
  github-workflow-monitor:
    build:
      context: .
      dockerfile: services/Dockerfile
    command:
    - python
    - -m
    - services.github_workflow_monitor_service
    environment:
      GOVOS_ALLOW_DEV_SECRETS: ${GOVOS_ALLOW_DEV_SECRETS:-1}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
      AUTH_INTROSPECTION_URL: http://auth:8101/api/v2/auth/introspect
      AUTH_READY_URL: http://auth:8101/api/v2/ready
      TENANT_SERVICE_URL: http://tenant:8102
      TENANT_READY_URL: http://tenant:8102/api/v2/ready
      DEPENDENCY_TIMEOUT_SECONDS: ${DEPENDENCY_TIMEOUT_SECONDS:-3}
      PLATFORM_VERSION: ${PLATFORM_VERSION:-unknown}
      BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      COMMIT_SHA: ${COMMIT_SHA:-unknown}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      WORKBOARD_DISPATCH_LOG: /data/dispatch/govos_v2_dispatch.jsonl
      WORKBOARD_TARGET_THREAD: ${WORKBOARD_TARGET_THREAD:-workboard-quad-os}
      NEO4J_HTTP: ${NEO4J_HTTP:-http://neo4j:7474/db/neo4j/tx/commit}
      GRAPH_REFRESH_STATE_PATH: /data/dispatch/graph_refresh_state.json
      GRAPH_STACK_VERSION: ${GRAPH_STACK_VERSION:-5.2}
      NEO4J_AURA_URI: ${NEO4J_AURA_URI:-}
      NEO4J_AURA_USER: ${NEO4J_AURA_USER:-neo4j}
      NEO4J_AURA_PASSWORD: ${NEO4J_AURA_PASSWORD:-}
      NEO4J_AURA_ENABLED: ${NEO4J_AURA_ENABLED:-false}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-jimlangford}
      GITHUB_REPO: ${GITHUB_REPO:-12sgi-king}
      GITHUB_WORKFLOW_MONITOR_ENABLED: ${GITHUB_WORKFLOW_MONITOR_ENABLED:-true}
      GITHUB_REPAIR_LOOKBACK_MINUTES: ${GITHUB_REPAIR_LOOKBACK_MINUTES:-60}
      GITHUB_REPAIR_INTERVAL_SECONDS: ${GITHUB_REPAIR_INTERVAL_SECONDS:-300}
      GITHUB_REPAIR_AUTONOMY_THRESHOLD: ${GITHUB_REPAIR_AUTONOMY_THRESHOLD:-75}
      GITHUB_REPAIR_MAX_CONCURRENT: ${GITHUB_REPAIR_MAX_CONCURRENT:-3}
      GITHUB_AUTO_REPAIR_DRY_RUN: ${GITHUB_AUTO_REPAIR_DRY_RUN:-false}
      REPO_PATH: /repo
    volumes:
    - v2-db:/data/db
    - v2-dispatch:/data/dispatch
    - .:/repo
    depends_on:
    - king-bridge
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
volumes:
  v2-db: null
  v2-dispatch: null
  v2-ollama: null
  v2-neo4j-data: null
  v2-neo4j-logs: null
