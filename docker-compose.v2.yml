services:
  # ---------------------------------------------------------------------------
  # neo4j MOVED OUT (Jimmy 2026-07-15: "isolate neo4j so a v2 deploy can never wipe the brain").
  # neo4j (the ~10.4k-node whole-system graph, 14 native consumers) now lives in its OWN compose:
  #     docker-compose.neo4j.yml   (container: quados-neo4j, same external volume 12sgi-king_v2-neo4j-data)
  # It is DELIBERATELY absent here so `docker compose -f docker-compose.v2.yml up/down/-v` can never
  # recreate or wipe it. v2 services still reach it via NEO4J_HTTP=http://host.docker.internal:7474 or
  # the shared external volume; the brain's lifecycle is standalone. Board item wb1784180689000 = this.
  # DO NOT re-add a neo4j service here. To restart the graph: docker compose -f docker-compose.neo4j.yml up -d
  # ---------------------------------------------------------------------------
  auth:
    build:
      context: .
      dockerfile: services/Dockerfile
    command:
