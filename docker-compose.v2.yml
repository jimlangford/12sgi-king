  gpu-runtime:
    # RETIRED from the default stack (audit-quad-os 2026-07-15, review wf_42ab0998-444, Jimmy 'i want
    # everything fixed'): this container held ZERO models while reserving the whole 8GB co-tenant GPU,
    # and gpu-router's GPU_RUNTIME_URL already defaults to the host Ollama (which has all king-* models).
    # Kept defined under the 'legacy-gpu' profile for deliberate revival:
    #   docker compose --profile legacy-gpu -f docker-compose.v2.yml up -d gpu-runtime
    profiles: ["legacy-gpu"]
    image: ollama/ollama:latest
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    volumes:
    - v2-ollama:/root/.ollama
    expose:
    - '11434'
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - ollama
      - list
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
