      BUILD_TIME: ${BUILD_TIME:-unknown}
      COMMIT_SHA: ${COMMIT_SHA:-unknown}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      WORKBOARD_DISPATCH_LOG: /data/dispatch/govos_v2_dispatch.jsonl
      WORKBOARD_TARGET_THREAD: ${WORKBOARD_TARGET_THREAD:-workboard-quad-os}
      NEO4J_HTTP: ${NEO4J_HTTP:-http://neo4j:7474/db/neo4j/tx/commit}
      GRAPH_REFRESH_STATE_PATH: /data/dispatch/graph_refresh_state.json
      GRAPH_STACK_VERSION: ${GRAPH_STACK_VERSION:-5.2}
      NEO4J_AURA_URI: ${NEO4J_AURA_URI:-}
      NEO4J_AURA_USER: ${NEO4J_AURA_USER:-neo4j}
      NEO4J_AURA_PASSWORD: ${NEO4J_AURA_PASSWORD:-}
      NEO4J_AURA_ENABLED: ${NEO4J_AURA_ENABLED:-false}
      GPU_ROUTER_DB_PATH: /data/db/govos_v2_gpu_router.db
      # 2026-07-15 (Jimmy: make the router the REAL GPU governor): point at the HOST ollama, which
      # holds all 46 real king-* models. The in-stack gpu-runtime container is empty (0 models), so
      # the router was serialising a door nobody used. host.docker.internal:11434 = the real brain,
      # reachable from this container (verified). The router's _gpu_worker_lock now serialises the
      # actual GPU. Override with GPU_RUNTIME_URL env to switch back to the container path.
      GPU_RUNTIME_URL: ${GPU_RUNTIME_URL:-http://host.docker.internal:11434}
      GPU_CLIENT_PRIORITIES: ${GPU_CLIENT_PRIORITIES:-govos-core:1,maui-tenant:2,studio:3,civic-signal:4,workboard:5,reports:6}
      GPU_INFER_TIMEOUT: ${GPU_INFER_TIMEOUT:-120}
    volumes:
    - v2-db:/data/db
    - v2-dispatch:/data/dispatch
    ports:
    - 127.0.0.1:8107:8107
    depends_on:
    - auth
    # gpu-runtime dependency removed 2026-07-15 (service retired to the legacy-gpu profile;
    # GPU_RUNTIME_URL defaults to the host Ollama which holds all king-* models)
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request as u; u.urlopen('http://localhost:8107/api/v2/ready',
        timeout=3)
      interval: 30s
