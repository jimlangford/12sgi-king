# govOS v2 backend — local/king-server container stack.
#
# Runs the 5 FastAPI services (auth/tenant/documents/storage/ai) plus the health aggregator as
# containers on this machine (king-server, Tailscale host 12sgianonymous.tail760750.ts.net).
# This replaces ad-hoc `uvicorn ... --app-dir` processes from docs/GOVOS_V2_LOCAL_DEV.md with
# supervised, restart-on-failure containers — a step toward "build it out, then flip the switch
# live" without needing SSH/rsync into anywhere. Ports are bound to 127.0.0.1 only; reach them
# over Tailscale via this host, same trust boundary as the rest of the local automation.
#
# Usage:
#   docker compose -f docker-compose.v2.yml up -d --build
#   docker compose -f docker-compose.v2.yml ps
#   docker compose -f docker-compose.v2.yml logs -f auth
#   docker compose -f docker-compose.v2.yml down
#
# Secrets note: AUTH_SIGNING_SECRET / INTERNAL_SERVICE_TOKEN below use dev defaults matching
# docs/GOVOS_V2_LOCAL_DEV.md. Override with a local `.env.v2` (gitignored) before exposing this
# past Tailscale-private use. GOVOS_ALLOW_DEV_SECRETS=1 is the explicit opt-in that lets the auth
# service boot on those dev defaults at all (services/auth/app/main.py fails to start without it) --
# a deploy that forgets to set a real secret AND forgets this flag now fails loudly instead of
# silently shipping an auth bypass.

x-common-env: &common-env
  GOVOS_ALLOW_DEV_SECRETS: ${GOVOS_ALLOW_DEV_SECRETS:-1}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-token}
  AUTH_INTROSPECTION_URL: http://auth:8101/api/v2/auth/introspect
  AUTH_READY_URL: http://auth:8101/api/v2/ready
  TENANT_SERVICE_URL: http://tenant:8102
  TENANT_READY_URL: http://tenant:8102/api/v2/ready
  DEPENDENCY_TIMEOUT_SECONDS: ${DEPENDENCY_TIMEOUT_SECONDS:-3}
  COMMIT_SHA: ${COMMIT_SHA:-unknown}
  BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
  ENVIRONMENT: ${ENVIRONMENT:-local}
  WORKBOARD_DISPATCH_LOG: /data/dispatch/govos_v2_dispatch.jsonl
  WORKBOARD_TARGET_THREAD: ${WORKBOARD_TARGET_THREAD:-workboard-quad-os}
  NEO4J_HTTP: ${NEO4J_HTTP:-http://neo4j:7474/db/neo4j/tx/commit}
  GRAPH_REFRESH_STATE_PATH: /data/dispatch/graph_refresh_state.json
  GRAPH_STACK_VERSION: ${GRAPH_STACK_VERSION:-5.2}

services:
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: none
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE_SIZE:-512M}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_SIZE:-512M}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_SIZE:-512M}
      NEO4J_server_config_strict__validation_enabled: "false"
    volumes:
      - v2-neo4j-data:/data
      - v2-neo4j-logs:/logs
    ports: ["127.0.0.1:7474:7474", "127.0.0.1:7687:7687"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  auth:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.auth.app.main:app", "--host", "0.0.0.0", "--port", "8101"]
    environment:
      <<: *common-env
      AUTH_SIGNING_SECRET: ${AUTH_SIGNING_SECRET:-dev-only-signing-secret-change-me}
      AUTH_DB_PATH: /data/db/govos_v2_auth.db
      # OAuth — set in .env.v2 (gitignored).  Leave blank to disable the provider.
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Public URL of this auth service (used to build OAuth callback URIs).
      AUTH_PUBLIC_URL: ${AUTH_PUBLIC_URL:-https://auth.12sgi.com}
      # Console URL to redirect back to after sign-in (#token=... appended).
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-https://12sgi.com/king/}
      # Comma-separated owner allow-lists.
      OWNER_GITHUB_LOGINS: ${OWNER_GITHUB_LOGINS:-jimlangford}
      OWNER_GOOGLE_EMAILS: ${OWNER_GOOGLE_EMAILS:-}
      # CORS origins for the console front-end.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://jimlangford.github.io,https://12sgi.com}
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8101:8101"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8101/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  tenant:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.tenant.app.main:app", "--host", "0.0.0.0", "--port", "8102"]
    environment:
      <<: *common-env
      TENANT_DB_PATH: /data/db/govos_v2_tenant.db
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8102:8102"]
    depends_on: [auth]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8102/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  documents:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.documents.app.main:app", "--host", "0.0.0.0", "--port", "8103"]
    environment:
      <<: *common-env
      DOCUMENTS_DB_PATH: /data/db/govos_v2_documents.db
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8103:8103"]
    depends_on: [auth, tenant]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8103/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  storage:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.storage.app.main:app", "--host", "0.0.0.0", "--port", "8104"]
    environment:
      <<: *common-env
      STORAGE_DB_PATH: /data/db/govos_v2_storage.db
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8104:8104"]
    depends_on: [auth]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8104/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.ai.app.main:app", "--host", "0.0.0.0", "--port", "8105"]
    environment:
      <<: *common-env
      AI_DB_PATH: /data/db/govos_v2_ai.db
      GPU_ROUTER_URL: http://gpu-router:8107
      GPU_ROUTER_READY_URL: http://gpu-router:8107/api/v2/ready
      GPU_DEFAULT_MODEL: ${GPU_DEFAULT_MODEL:-llama3}
      GPU_INFER_TIMEOUT: ${GPU_INFER_TIMEOUT:-120}
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8105:8105"]
    depends_on: [auth, tenant, gpu-router]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8105/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  health:
    build: { context: ., dockerfile: services/Dockerfile }
    # Bound to 8106, not 8000 — 8000 was already occupied by another local process on this host.
    command: ["python", "-m", "uvicorn", "services.health.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      COMMIT_SHA: ${COMMIT_SHA:-unknown}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-unknown}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      SURFACES_LIST: "auth=auth:8101,tenant=tenant:8102,documents=documents:8103,storage=storage:8104,ai=ai:8105,gpu-router=gpu-router:8107"
      SURFACES_HEALTH_PATH: /api/v2/ready
    ports: ["127.0.0.1:8106:8000"]
    depends_on: [auth, tenant, documents, storage, ai, gpu-router]
    restart: unless-stopped

  # ── GPU layer ──────────────────────────────────────────────────────────────
  # gpu-runtime: Ollama; one container owns the GPU.
  # gpu-router:  priority queue that serialises who gets GPU time.
  # ───────────────────────────────────────────────────────────────────────────

  gpu-runtime:
    image: ollama/ollama:latest
    # GPU passthrough — works when the host has NVIDIA drivers + nvidia-container-toolkit.
    # Remove the `deploy` block on CPU-only hosts; Ollama will fall back to CPU inference.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - v2-ollama:/root/.ollama
    # NO host port publish (2026-07-09 fleet review V2-DOCK-1): the owner's REAL production Ollama
    # already owns host :11434 (the ~40 baked king-<lane> models). Publishing the container's 11434
    # to the host either (a) fails to bind (host Ollama holds it) so this container never starts, or
    # (b) wins the bind and every host lane that queries :11434 hits an EMPTY container Ollama instead
    # of the real models -- the exact silent "fleet fabrication" / cold-start symptom, caused by infra
    # not by the models. gpu-router reaches Ollama over the internal Docker network only
    # (GPU_RUNTIME_URL=http://gpu-runtime:11434), so nothing needs 11434 on the host. If you ever want
    # host visibility for debugging, remap to an unused port e.g. "127.0.0.1:11435:11434".
    expose: ["11434"]
    restart: unless-stopped
    healthcheck:
      # ollama/ollama:latest is Ubuntu-based and ships wget; avoid python3 (not guaranteed).
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  gpu-router:
    build: { context: ., dockerfile: services/Dockerfile }
    command: ["python", "-m", "uvicorn", "services.gpu_router.app.main:app", "--host", "0.0.0.0", "--port", "8107"]
    environment:
      <<: *common-env
      GPU_ROUTER_DB_PATH: /data/db/govos_v2_gpu_router.db
      GPU_RUNTIME_URL: http://gpu-runtime:11434
      # Comma-separated priority list (lower = higher priority).
      # Clients: govos-core:1, maui-tenant:2, studio:3, civic-signal:4, workboard:5, reports:6
      GPU_CLIENT_PRIORITIES: ${GPU_CLIENT_PRIORITIES:-govos-core:1,maui-tenant:2,studio:3,civic-signal:4,workboard:5,reports:6}
      GPU_INFER_TIMEOUT: ${GPU_INFER_TIMEOUT:-120}
    volumes:
      - v2-db:/data/db
      - v2-dispatch:/data/dispatch
    ports: ["127.0.0.1:8107:8107"]
    depends_on: [auth, gpu-runtime]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request as u; u.urlopen('http://localhost:8107/api/v2/ready', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  v2-db:
  v2-dispatch:
  v2-ollama:   # Ollama model cache — survives container restarts
  v2-neo4j-data:
  v2-neo4j-logs:
