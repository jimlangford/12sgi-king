# ╔══════════════════════════════════════════════════════════════════════════════════════════╗
# ║ 12sgi-king NGINX Configuration                                                           ║
# ║ Production-ready proxy setup for govOS v2 board API and owner console                    ║
# ╚══════════════════════════════════════════════════════════════════════════════════════════╝

# INSTALLATION & SETUP
# ====================
# 1. Linux (Debian/Ubuntu):
#    - Copy this entire server block into /etc/nginx/sites-available/12sgi-king
#    - Create symlink: sudo ln -s /etc/nginx/sites-available/12sgi-king /etc/nginx/sites-enabled/
#    - Test config: sudo nginx -t
#    - Reload: sudo systemctl reload nginx
#
# 2. Docker (if nginx runs in container):
#    - Mount this file to /etc/nginx/conf.d/12sgi-king-upstream.conf
#    - Or add these blocks to your main nginx.conf server section
#
# 3. macOS:
#    - Copy to /usr/local/etc/nginx/servers/12sgi-king.conf
#    - brew services reload nginx

# ═══════════════════════════════════════════════════════════════════════════════════════════
# UPSTREAM SERVICES (backend targets)
# ═══════════════════════════════════════════════════════════════════════════════════════════

upstream board_api_backend {
    # Loopback bind on Windows/Docker Desktop
    server 127.0.0.1:8799 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream king_bridge_backend {
    # Main AI orchestrator + model routing
    server 127.0.0.1:8109 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

upstream studio_assets_backend {
    # Studio vault asset indexing & serving
    server 127.0.0.1:8108 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

# ═══════════════════════════════════════════════════════════════════════════════════════════
# LOCATION BLOCKS (route rules) — add these to your server block
# ═══════════════════════════════════════════════════════════════════════════════════════════

# /board/api/* → board-api service (owner console + system monitoring)
location /board/api/ {
    proxy_pass http://board_api_backend/board/api/;
    
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    
    # Timeouts
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 10s;
    
    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    # Keep-alive
    proxy_set_header Connection "";
}

# /api/* → same as /board/api (dual route for convenience)
location /api/ {
    proxy_pass http://board_api_backend/api/;
    
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 10s;
}

# /bridge/api/* → king-bridge (AI inference + model selection)
location /bridge/api/ {
    proxy_pass http://king_bridge_backend/api/v2/bridge/;
    
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_connect_timeout 5s;
    proxy_read_timeout 120s;  # Long inference times
    proxy_send_timeout 30s;
    
    # Buffer large inference results
    proxy_buffer_size 16k;
    proxy_buffers 16 16k;
}

# /studio/api/* → studio-assets (asset vault + search)
location /studio/api/ {
    proxy_pass http://studio_assets_backend/api/v2/;
    
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    proxy_connect_timeout 5s;
    proxy_read_timeout 60s;
    proxy_send_timeout 10s;
}

# /studio/files/* → studio-assets file serving (direct download)
location /studio/files/ {
    proxy_pass http://studio_assets_backend/api/v2/assets/;
    
    proxy_http_version 1.1;
    proxy_buffering off;  # Stream files directly
    proxy_request_buffering off;
    
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    proxy_connect_timeout 5s;
    proxy_read_timeout 300s;  # Long download times OK
    proxy_send_timeout 30s;
}

