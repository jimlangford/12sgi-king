# ═══════════════════════════════════════════════════════════════════════════════════════════
# MONITORING & DEBUGGING
# ═══════════════════════════════════════════════════════════════════════════════════════════

# View nginx error/access logs:
#   tail -f /var/log/nginx/error.log
#   tail -f /var/log/nginx/access.log
#
# Test upstream connectivity:
#   curl -v http://localhost:8799/health
#   curl -v http://localhost:8109/api/v2/ready
#   curl -v http://localhost:8108/api/v2/health
#
# Verify proxy routing:
#   curl -v http://your-domain/api/docker
#   curl -v http://your-domain/board/api/ollama
#   curl -v http://your-domain/studio/api/assets

